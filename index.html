        function getPinnedGameIds(){
            try {
                const saved = JSON.parse(localStorage.getItem(GAME_PIN_STORAGE_KEY) || 'null');
                if (Array.isArray(saved)) {
                    const valid = saved.filter(id => GAME_DEFINITIONS.some(game => game.id === id));
                    return valid.slice(0,5);
                }
            } catch(e) {}
            return DEFAULT_PINNED_GAMES.slice();
        }
        function savePinnedGameIds(ids){ localStorage.setItem(GAME_PIN_STORAGE_KEY, JSON.stringify(ids.slice(0,5))); }
        function findGameDefinition(id){ return GAME_DEFINITIONS.find(game => game.id === id); }
        function launchGameById(id){
            const game = findGameDefinition(id);
            if (!game) return;
            closeModal('game-center-modal');
            setTimeout(function(){
                const launcher = window[game.action];
                if (typeof launcher === 'function') launcher();
            },80);
        }
        function renderPinnedGames(){
            const host = document.getElementById('pinned-game-buttons');
            if (!host) return;
            host.innerHTML = '';
            getPinnedGameIds().forEach(id => {
                const game = findGameDefinition(id);
                if (!game) return;
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'pinned-game-btn';
                button.style.background = game.color;
                button.textContent = game.icon + ' ' + game.name;
                button.onclick = function(){ launchGameById(game.id); };
                host.appendChild(button);
            });
        }
        function togglePinnedGame(id){
            const ids = getPinnedGameIds();
            const index = ids.indexOf(id);
            if (index >= 0) ids.splice(index,1);
            else {
                if (ids.length >= 5) { alert('顶部最多固定 5 个游戏，请先取消一个星标。'); return; }
                ids.push(id);
            }
            savePinnedGameIds(ids);
            renderPinnedGames();
            renderGameCenter();
        }
        function renderGameCenter(){
            const host = document.getElementById('game-center-content');
            if (!host) return;
            host.innerHTML = '';
            const pinned = getPinnedGameIds();
            ['课堂互动','英语练习'].forEach(groupName => {
                const section = document.createElement('section');
                section.className = 'game-center-section';
                const heading = document.createElement('div');
                heading.className = 'game-center-section-title';
                heading.textContent = groupName;
                const grid = document.createElement('div');
                grid.className = 'game-center-grid';
                GAME_DEFINITIONS.filter(game => game.group === groupName).forEach(game => {
                    const item = document.createElement('div');
                    item.className = 'game-launch-item';
                    const launchButton = document.createElement('button');
                    launchButton.type = 'button';
                    launchButton.className = 'game-launch-btn';
                    launchButton.style.background = game.color;
                    launchButton.onclick = function(){ launchGameById(game.id); };
                    const icon = document.createElement('span');
                    icon.className = 'game-launch-icon';
                    icon.textContent = game.icon;
                    const name = document.createElement('span');
                    name.className = 'game-launch-name';
                    name.textContent = game.name;
                    launchButton.append(icon,name);
                    const pinButton = document.createElement('button');
                    const isPinned = pinned.includes(game.id);
                    pinButton.type = 'button';
                    pinButton.className = 'game-pin-btn' + (isPinned ? ' active' : '');
                    pinButton.textContent = isPinned ? '★' : '☆';
                    pinButton.title = isPinned ? '取消顶部固定' : '固定到顶部';
                    pinButton.setAttribute('aria-label', pinButton.title);
                    pinButton.onclick = function(event){ event.stopPropagation(); togglePinnedGame(game.id); };
                    item.append(launchButton,pinButton);
                    grid.appendChild(item);
                });
                section.append(heading,grid);
                host.appendChild(section);
            });
        }
        function openGameCenter(){ renderGameCenter(); document.getElementById('game-center-modal').classList.add('show'); }

        function getAudioCtx() { if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
        function playSound(t) { try { let c=getAudioCtx(); if(c.state==='suspended') c.resume(); let o=c.createOscillator(), g=c.createGain(); o.connect(g); g.connect(c.destination); let n=c.currentTime; if(t==='add'){ o.type='sine'; o.frequency.setValueAtTime(600,n); o.frequency.exponentialRampToValueAtTime(1200,n+0.1); g.gain.setValueAtTime(0.5,n); g.gain.exponentialRampToValueAtTime(0.01,n+0.3); o.start(n); o.stop(n+0.3); } else if(t==='sub'){ o.type='sawtooth'; o.frequency.setValueAtTime(300,n); o.frequency.exponentialRampToValueAtTime(150,n+0.2); g.gain.setValueAtTime(0.4,n); g.gain.exponentialRampToValueAtTime(0.01,n+0.3); o.start(n); o.stop(n+0.3); } else if(t==='new'){ o.type='square'; o.frequency.setValueAtTime(400,n); o.frequency.setValueAtTime(800,n+0.1); g.gain.setValueAtTime(0.2,n); g.gain.exponentialRampToValueAtTime(0.01,n+0.2); o.start(n); o.stop(n+0.2); } } catch(e){} }

        function startClock() {
            const days=['周日','周一','周二','周三','周四','周五','周六'];
            let lastSec = -1;
            function tick() {
                let d=new Date();
                let sec = d.getSeconds();
                if (sec !== lastSec) {
                    lastSec = sec;
                    document.getElementById('date-line').innerText=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()} ${days[d.getDay()]}`;
                    document.getElementById('time-line').innerText=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
                }
                requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        }

        function loadDeletedClassIds() { try { const raw = localStorage.getItem('englishDeletedClassIds'); deletedClassIds = raw ? JSON.parse(raw) : []; } catch(e) { deletedClassIds = []; } }

        function loadAllClassesFromStorage() {
            let s=localStorage.getItem('englishAllClasses');
            if(s) try{allClasses=JSON.parse(s);}catch(e){allClasses={};}
            if(!allClasses||Object.keys(allClasses).length===0){ let id='class_'+Date.now(); allClasses={[id]:{name:'默认班级',students:[],logs:[]}}; }

        function getCurrentClass(){ return allClasses[currentClassId]||{name:'未命名',students:[],logs:[]}; }

        function getLogs(){ return getCurrentClass().logs; }
        function readLocalVocabulary(kind) {
            const key = VOCAB_LOCAL_KEYS[kind];
            if (!key) return null;
            try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { return null; }
        }
        function writeLocalVocabulary(kind, data) {
            const key = VOCAB_LOCAL_KEYS[kind];
            if (!key) return false;
            try {
                if (data == null) localStorage.removeItem(key);
                else localStorage.setItem(key, JSON.stringify(data));
                return true;
            } catch(e) { return false; }
        }
        function extractVocabularyPayload(row) {
            if (!row) return null;
            const logs = row.logs;
            if (Array.isArray(logs)) return logs.find(item => item && item.kind === VOCAB_CLOUD_KIND) || null;
            if (logs && typeof logs === 'object') return logs.payload || logs;
            const students = row.students;
            if (students && typeof students === 'object' && !Array.isArray(students)) return students.payload || students;
            return null;
        }
        function applyVocabularyPayload(payload) {
            if (!payload || typeof payload !== 'object') return false;
            if (Object.prototype.hasOwnProperty.call(payload, 'dictation_vocab')) writeLocalVocabulary('dictation', payload.dictation_vocab);
            if (Object.prototype.hasOwnProperty.call(payload, 'matchgame_vocab')) writeLocalVocabulary('matchgame', payload.matchgame_vocab);
            if (Object.prototype.hasOwnProperty.call(payload, 'ketverb_vocab')) writeLocalVocabulary('ketverb', payload.ketverb_vocab);
            return true;
        }
        function buildVocabularyPayload() {
            return {
                kind: VOCAB_CLOUD_KIND,
                version: 1,
                dictation_vocab: readLocalVocabulary('dictation'),
                matchgame_vocab: readLocalVocabulary('matchgame'),
                ketverb_vocab: readLocalVocabulary('ketverb'),
                updated_at: new Date().toISOString()
            };
        }
        async function syncVocabularyToCloud() {
            if (!supabaseClient || !isCloudMode || !cloudUser) return false;
            try {
                updateSyncStatus('pending');
                const payload = buildVocabularyPayload();
                const { error } = await supabaseClient.from('class_data').upsert({
                    user_id: cloudUser.id,
                    class_id: VOCAB_CLOUD_CLASS_ID,
                    class_name: '__vocabulary__',
                    students: [],
                    logs: [payload],
                    updated_at: new Date().toISOString()
                }, { onConflict: 'user_id,class_id' });
                if (error) throw error;
                updateSyncStatus('ok');
                return true;
            } catch(e) {
                console.warn('Vocabulary cloud sync failed:', e);
                updateSyncStatus('error');
                return false;
            }
        }
        function saveVocabularyData(kind, data) {
            const ok = writeLocalVocabulary(kind, data);
            if (ok && isCloudMode && cloudUser && supabaseClient) syncVocabularyToCloud();
            return ok;
        }

                updateSyncStatus('ok'); } catch(e) { updateSyncStatus('error'); }
        }

        function updateSyncStatus(s){ let e=document.getElementById('sync-status'); e.classList.remove('sync-ok','sync-pending','sync-error'); if(s==='ok'){ e.classList.add('sync-ok'); e.innerText='☁️ 已同步'; } else if(s==='pending'){ e.classList.add('sync-pending'); e.innerText='⏳ 同步中...'; } else { e.classList.add('sync-error'); e.innerText='⚠️ 同步失败'; } }
        function initSupabase(){ 
            if(isSupabaseConfigured){ 
                try {
                    if(typeof supabase === 'undefined' || !supabase || !supabase.createClient){
                        throw new Error('Supabase SDK 加载失败，请检查网络或使用离线模式');
                    }
                    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {auth:{persistSession:true,autoRefreshToken:true}});
                    console.log('Supabase client created:', !!supabaseClient);
                } catch(e) {
                    console.error('Supabase init failed:', e.message);
                    supabaseClient = null;
                    // 不阻断登录界面显示，只做日志提示
                }
            }
        }
        async function checkExistingSession(){ if(!supabaseClient) return false; try{ let {data:{session}}=await supabaseClient.auth.getSession(); console.log('Existing session check:', session?'found':'none'); if(session?.user){ cloudUser=session.user; isCloudMode=true; return true; } }catch(e){ console.error('Session check error:', e.message); } return false; }
        async function handleLogin(){
            console.log('=== Login attempt ===');
            console.log('supabaseClient exists:', !!supabaseClient);
            if(!supabaseClient){ 
                document.getElementById('login-error').innerText='云端服务暂时无法连接，请点击下方"离线使用"或稍后重试'; 
                return; 
            }
            let email=document.getElementById('login-email').value.trim(), pass=document.getElementById('login-password').value;
            document.getElementById('login-error').innerText='';
            if(!email||!pass){ document.getElementById('login-error').innerText='请输入邮箱和密码'; return; }
            if(pass.length<6){ document.getElementById('login-error').innerText='密码至少6位'; return; }
            let btn=document.querySelector('#login-form .login-btn-primary');
            btn.disabled=true; btn.innerText='登录中...';
            try{ 
                let {data,error}=await supabaseClient.auth.signInWithPassword({email,password:pass});
                if(error){ 
                    let msg = error.message || '';
                    let hint = '';
                    if(msg.includes('Invalid login') || msg.includes('invalid_credentials') || error.status===400){
                        hint = '邮箱或密码错误，请确认后重试';
                    } else if(msg.includes('Email not confirmed')){
                        hint = '邮箱尚未验证，请检查注册邮件并点击确认链接';
                    } else if(msg.includes('network') || msg.includes('fetch')){
                        hint = '网络连接失败，请检查网络后重试';
                    } else {
                        hint = msg;
                    }
                    document.getElementById('login-error').innerText='❌ ' + hint;
                    btn.disabled=false; btn.innerText='🚀 登 录'; return; 
                }
                if(data && data.user){ 
                    cloudUser=data.user; isCloudMode=true; 
                    try { showAppUI(); } catch(e) { document.getElementById('login-error').innerText='加载失败: '+e.message; btn.disabled=false; btn.innerText='🚀 登 录'; }
                } else {
                    document.getElementById('login-error').innerText='登录异常，请重试';
                    btn.disabled=false; btn.innerText='🚀 登 录';
                }
            }catch(e){ 
                let msg = e.message || String(e);
                let hint = msg.includes('fetch') || msg.includes('network') ? '网络连接失败，请检查网络' : ('错误：' + msg);
                document.getElementById('login-error').innerText='❌ ' + hint;
                btn.disabled=false; btn.innerText='🚀 登 录';
            }
        }
        async function handleRegister(){
            if(!supabaseClient){ document.getElementById('register-error').innerText='云端未配置'; return; }
            let email=document.getElementById('register-email').value.trim(), pass=document.getElementById('register-password').value, conf=document.getElementById('register-password-confirm').value;
            document.getElementById('register-error').innerText=''; document.getElementById('register-success').innerText='';
            if(!email||!pass||!conf){ document.getElementById('register-error').innerText='请填写所有字段'; return; }
            if(pass.length<6){ document.getElementById('register-error').innerText='密码至少6位'; return; }
            if(pass!==conf){ document.getElementById('register-error').innerText='两次密码不一致'; return; }
            try{ let {data,error}=await supabaseClient.auth.signUp({email,password:pass});
                if(error){ if(error.message.includes('already')) document.getElementById('register-error').innerText='该邮箱已注册'; else document.getElementById('register-error').innerText='注册失败: '+error.message; return; }
                if(data.user&&data.session){ cloudUser=data.user; isCloudMode=true; showAppUI(); }
                else{ document.getElementById('register-success').innerText='✅ 注册成功！请登录'; }
            }catch(e){ document.getElementById('register-error').innerText='网络错误'; }
        }
        function switchToRegister(){ document.getElementById('login-form').style.display='none'; document.getElementById('register-form').style.display='block'; }
        function switchToLogin(){ document.getElementById('login-form').style.display='block'; document.getElementById('register-form').style.display='none'; }
        function useOfflineMode(){ isCloudMode=false; cloudUser=null; showAppUI(); }
        async function testConnection(){
            const el = document.getElementById('login-error');
            el.innerText = '🔍 正在检测...';
            try {
                if(typeof supabase === 'undefined' || !supabase){
                    el.innerText = '❌ Supabase SDK 未加载（可能被网络拦截）。请使用离线模式，或检查网络后刷新。';
                    return;
                }
                if(!supabaseClient){
                    el.innerText = '❌ 云端客户端初始化失败。请使用离线模式。';
                    return;
                }
                // Try a lightweight ping
                const { error } = await supabaseClient.auth.getSession();
                if(error){
                    el.innerText = '❌ 连接测试失败：' + error.message;
                } else {
                    el.innerText = '✅ 云端连接正常，请输入邮箱和密码登录。';
                }
            } catch(e){
                el.innerText = '❌ 连接异常：' + e.message + '。建议使用"离线使用"模式。';
            }
        }
        async function handleLogout(){ if(isCloudMode&&supabaseClient) await supabaseClient.auth.signOut(); isCloudMode=false; cloudUser=null; location.reload(); }
        async function loadCloudData(){
            if(!supabaseClient||!isCloudMode||!cloudUser) return;
            try{ updateSyncStatus('pending'); let {data,error}=await supabaseClient.from('class_data').select('*').eq('user_id',cloudUser.id);
                if(error){ updateSyncStatus('error'); return; }
                loadDeletedClassIds(); allClasses = {}; let foundVocabulary = false;
                if(data&&data.length){ data.forEach(r=>{ if (r.class_id === VOCAB_CLOUD_CLASS_ID) { foundVocabulary = true; applyVocabularyPayload(extractVocabularyPayload(r)); return; } if (deletedClassIds.includes(r.class_id)) { deleteClassFromCloud(r.class_id); return; } allClasses[r.class_id]={name:r.class_name,students:r.students||[],logs:r.logs||[]}; }); }
                if (Object.keys(allClasses).length === 0) { let id = 'class_' + Date.now(); allClasses[id] = { name: '默认班级', students: [], logs: [] }; }
                if (!allClasses[currentClassId]) currentClassId = Object.keys(allClasses)[0];
                localStorage.setItem('englishAllClasses', JSON.stringify(allClasses)); localStorage.setItem('englishCurrentClassId', currentClassId);
                if(!foundVocabulary && (readLocalVocabulary('dictation') || readLocalVocabulary('matchgame'))) syncVocabularyToCloud();
                updateSyncStatus('ok');
            }catch(e){ updateSyncStatus('error'); }
        }
        async function deleteClassFromCloud(classId) { if(!supabaseClient||!isCloudMode||!cloudUser) return; await supabaseClient.from('class_data').delete().eq('user_id',cloudUser.id).eq('class_id',classId); }
        function showAppUI(){
            document.getElementById('login-overlay').style.display='none'; document.getElementById('app-container').style.display='flex';
            loadDeletedClassIds(); updateUserBadge(); updateSyncStatus('ok');
            loadAllClassesFromStorage(); initEmojis(); renderPinnedGames(); renderGrid(); renderRanking(); updateClassTitle(); startClock();

    </section>
  </main>

  <div id="toast" class="toast" role="status"></div>

  <div id="resultModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
    <div class="modal">
      <div class="modal-emoji" aria-hidden="true">🏆</div>
      <h2 id="resultTitle">挑战完成！</h2>
      <div class="result-grid">
        <div class="result-box">完成用时<strong id="resultTime">00:00</strong></div>
        <div class="result-box">错误点击<strong id="resultWrong">0 次</strong></div>
      </div>
      <div class="wrong-list"><b>📚 不熟悉的单词</b><div id="resultWords">太棒了，本轮没有错词！</div></div>
      <div class="modal-actions">
        <button id="retryWrongBtn" class="btn primary" type="button">🧠 错词重练</button>
        <button id="playAgainBtn" class="btn" type="button">🧒 下一位玩家</button>
        <button id="closeModalBtn" class="btn ghost" type="button">关闭</button>
      </div>
    </div>
  </div>

  <script>
    "use strict";

    /* ===================== postMessage 积分系统桥接 ===================== */
    let _bridge = { classes: [], currentClassId: null, students: [], selectedStudentId: null, vocabulary: null };

    function onClassChange(classId) {
      if (!classId) return;
      _bridge.selectedStudentId = null;
      // 通知父页面切换班级
      window.parent.postMessage({ type: 'ketverb:switchClass', classId }, '*');
    }

    function onStudentSelect(studentId) {
      _bridge.selectedStudentId = studentId || null;
      const startBtn = document.getElementById('startBtn');
      if (startBtn) startBtn.disabled = !studentId;
    }

    function applyBridgeData(payload) {
      if (!payload) return;
      _bridge.classes = payload.classes || [];
      _bridge.currentClassId = payload.currentClassId || null;
      _bridge.students = payload.students || [];
      // 如果父页面传来了云端词表，用它覆盖本地
      if (payload.vocabulary && Array.isArray(payload.vocabulary) && payload.vocabulary.length >= 15) {
        try {
          localStorage.setItem('ketVerbMatch_words_v1', JSON.stringify(payload.vocabulary));
          currentWords = payload.vocabulary.map(function(w){ return Object.assign({}, w); });
          pendingWords = currentWords.map(function(w){ return Object.assign({}, w); });
          renderPreview();
          var el = document.getElementById('teacherStatus');
          if (el) el.textContent = '云端词表已加载（' + currentWords.length + ' 组）';
          prepareRound(drawNextStandardRound(true), false);
        } catch(e) {}
      }

      // 填充班级下拉
      const classSelect = document.getElementById('className');
      if (classSelect) {
        const cur = classSelect.value || _bridge.currentClassId;
        classSelect.innerHTML = '<option value="">选择班级</option>';
        _bridge.classes.forEach(cls => {
          const opt = document.createElement('option');
          opt.value = cls.id;
          opt.textContent = cls.name;
          if (cls.id === cur) opt.selected = true;
          classSelect.appendChild(opt);
        });
        if (!classSelect.value && _bridge.currentClassId) {
          classSelect.value = _bridge.currentClassId;
        }
      }

      // 填充学生下拉
      const stuSelect = document.getElementById('studentSelect');
      if (stuSelect) {
        const prevStu = _bridge.selectedStudentId;
        stuSelect.innerHTML = '<option value="">请选择学生</option>';
        _bridge.students.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.avatar ? s.avatar + ' ' + s.name : s.name;
          if (s.id === prevStu) opt.selected = true;
          stuSelect.appendChild(opt);
        });
        if (stuSelect.value) _bridge.selectedStudentId = stuSelect.value;
        else _bridge.selectedStudentId = null;
        const startBtn = document.getElementById('startBtn');
        if (startBtn) startBtn.disabled = !_bridge.selectedStudentId;
      }
    }

    window.addEventListener('message', function(ev) {
      const msg = ev && ev.data;
      if (!msg || typeof msg !== 'object') return;
      if (msg.type === 'ketverb:data') {
        applyBridgeData(msg.payload);
      }
    });

    // 请求父页面发送数据（页面加载后执行）
    function requestBridgeData() {
      window.parent.postMessage({ type: 'ketverb:requestData' }, '*');
    }

    // 监听词表数据返回
    window.addEventListener('message', function(ev) {
      var msg = ev && ev.data;
      if (!msg || typeof msg !== 'object') return;
      if (msg.type === 'ketverb:data') {
        applyBridgeData(msg.payload);
      }
      if (msg.type === 'ketverb:vocabularyData') {
        var vocab = msg.vocabulary;
        if (vocab && Array.isArray(vocab) && vocab.length >= 15) {
          try {
            localStorage.setItem('ketVerbMatch_words_v1', JSON.stringify(vocab));
            currentWords = vocab.map(function(w){ return Object.assign({}, w); });
            pendingWords = currentWords.map(function(w){ return Object.assign({}, w); });
            renderPreview();
            var el = document.getElementById('teacherStatus');
            if (el) el.textContent = '云端词表已加载（' + vocab.length + ' 组）';
            prepareRound(drawNextStandardRound(true), false);
          } catch(e) {}
        }
      }
    });

    /* 游戏结束后向父页面提交积分 */
    window.KET_POINTS_ADAPTER = {
      submit: function(result) {
        const studentId = _bridge.selectedStudentId;
        if (!studentId) return;
        // 每配对 1 对得 10 分，共 15 对最高 150 分
        const pairsMatched = result.score ? Math.round(result.score / 10) : 0;
        const finalScore = pairsMatched * 10;
        if (finalScore > 0) {
          window.parent.postMessage({ type: 'ketverb:addScore', studentId, score: finalScore }, '*');
        }
      }
    };

    /* ======================== Supabase 配置占位 ========================
       建议在 Supabase 创建表 ket_verb_lists：
       id bigint generated by default as identity primary key,
       list_name text unique,
       words jsonb not null,
       updated_at timestamptz default now()
       并根据实际课堂账号方案设置 RLS 策略。此处使用 REST API，无需额外 SDK。
    ================================================================= */
    const SUPABASE_URL = "请填写你的 Supabase URL";
    const SUPABASE_ANON_KEY = "请填写你的 Supabase anon key";
    const SUPABASE_TABLE = "ket_verb_lists";

    const DEFAULT_WORDS = [
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "go", past: "went", meaning: "去" },
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "see", past: "saw", meaning: "看见" },
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "eat", past: "ate", meaning: "吃" },
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "drink", past: "drank", meaning: "喝" },
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "buy", past: "bought", meaning: "买" },
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "bring", past: "brought", meaning: "带来" },
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "catch", past: "caught", meaning: "抓住" },
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "teach", past: "taught", meaning: "教" },
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "think", past: "thought", meaning: "想" },
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "make", past: "made", meaning: "制作" },
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "take", past: "took", meaning: "拿走" },
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "come", past: "came", meaning: "来" },
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "run", past: "ran", meaning: "跑" },
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "write", past: "wrote", meaning: "写" },
      { book: "KET Starter", unit: "Unit 1", theme: "不规则动词", base: "read", past: "read", meaning: "读" }
    ];

    const THEMES = {
      lavender:   { primary: "#a992e8", dark: "#7560ba", soft: "#f6f2ff", soft2: "#e9e0ff", page: "#fbf9ff" },
      mint:       { primary: "#63c9a7", dark: "#31997a", soft: "#edfff8", soft2: "#d4f7e9", page: "#f7fffc" },
      sky:        { primary: "#69b7ed", dark: "#398ec9", soft: "#eef8ff", soft2: "#d9efff", page: "#f8fcff" },
      orange:     { primary: "#f4a261", dark: "#cf7138", soft: "#fff4ea", soft2: "#ffe2c5", page: "#fffaf5" }
    };

    const STORAGE_WORDS = "ketVerbMatch_words_v1";
    const STORAGE_THEME = "ketVerbMatch_theme_v1";
    const STORAGE_RESULTS = "ketVerbMatch_results_v1";

    const $ = (selector) => document.querySelector(selector);
    const elements = {
      board: $("#board"), start: $("#startBtn"), restart: $("#restartBtn"), timer: $("#timer"),
      match: $("#matchCount"), wrong: $("#wrongCount"), audioLabel: $("#audioLabel"),
      progress: $("#progressBar"), waiting: $("#waitingCover"), roundNote: $("#roundNote"),
      preview: $("#previewBody"), status: $("#teacherStatus"), file: $("#excelInput"),
      modal: $("#resultModal"), retry: $("#retryWrongBtn"), toast: $("#toast")
    };

    let currentWords = loadLocalWords();
    let pendingWords = currentWords.map(word => ({ ...word }));
    let roundWords = currentWords.map(word => ({ ...word }));
    let pendingTopicGroups = null;
    let currentTopicGroups = null;
    let isRetryRound = false;
    let cards = [];
    let selectedCards = [];
    let matchedPairs = 0;
    let wrongClicks = 0;
    let wrongPairIds = new Set();
    let gameActive = false;
    let inputLocked = false;
    let timerId = null;
    let startTime = 0;
    let elapsedSeconds = 0;
    let preloadGeneration = 0;
    let audioPlayToken = 0;
    let toastTimer = null;
    let lastStandardRoundKeys = new Set();

    function loadLocalWords() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_WORDS));
        if (validateWords(saved, true).ok) return saved;
      } catch (_) {}
      return DEFAULT_WORDS.map(word => ({ ...word }));
    }

    function makeTopicKey(book, unit, theme) {
      return String(book || "未命名教材").trim() + "｜" + String(unit || "未命名单元").trim() + "｜" + String(theme || "综合").trim();
    }

    function normalizeWords(rows) {
      /* 支持新版6列格式（当前教材/单元/主题/base/past/meaning）和旧版3列格式（base/past/meaning）。*/
      return rows.map(row => {
        const clean = Object.fromEntries(Object.entries(row).map(([key, value]) => [String(key).trim().toLowerCase(), value]));
        /* 6列新格式字段 */
        const book = String(clean["当前教材"] ?? clean["book"] ?? "").trim();
        const unit = String(clean["单元"] ?? clean["unit"] ?? "").trim();
        const theme = String(clean["主题"] ?? clean["theme"] ?? "").trim();
        const base = String(clean["原形"] ?? clean["base"] ?? clean["动词原形"] ?? "").trim().toLowerCase();
        const past = String(clean["过去式"] ?? clean["past"] ?? "").trim().toLowerCase();
        const meaning = String(clean["中文"] ?? clean["meaning"] ?? clean["意思"] ?? "").trim();
        return { book, unit, theme, base, past, meaning };
      }).filter(word => word.base || word.past || word.meaning);
    }

    /* 将扁平词条列表按 教材｜单元｜主题 分组，返回 { key: [words] } */
    function groupByTopic(words) {
      const groups = {};
      words.forEach(word => {
        const key = (word.book || word.unit || word.theme)
          ? makeTopicKey(word.book, word.unit, word.theme)
          : "__default__";
        if (!groups[key]) groups[key] = [];
        groups[key].push(word);
      });
      return groups;
    }

    function validateWords(words, requireMinimum = true) {
      if (!Array.isArray(words)) return { ok: false, message: "词表格式不正确" };
      if (requireMinimum && words.length < 15) return { ok: false, message: \`词库至少需要 15 组，目前读取到 \${words.length} 组\` };
      if (!words.length) return { ok: false, message: "词表不能为空" };
      const badIndex = words.findIndex(word => !word.base || !word.past || !word.meaning);
      if (badIndex >= 0) return { ok: false, message: \`第 \${badIndex + 1} 行缺少原形(base)、过去式(past) 或 中文(meaning)\` };
      return { ok: true };
    }

    function renderPreview(words = pendingWords) {
      elements.preview.innerHTML = words.map((word, index) =>
        \`<tr><td>\${index + 1}</td><td>\${escapeHtml(word.book||"")}</td><td>\${escapeHtml(word.unit||"")}</td><td>\${escapeHtml(word.theme||"")}</td><td>\${escapeHtml(word.base)}</td><td>\${escapeHtml(word.past)}</td><td>\${escapeHtml(word.meaning)}</td></tr>\`
      ).join("");
    }

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = String(value);
      return div.innerHTML;
    }

    function shuffle(items) {
      const result = [...items];
      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

    function buildDeck(words) {
      return shuffle(words.flatMap((word, pairId) => [
        { id: \`p\${pairId}-base\`, pairId, type: "base", word: word.base, audioText: word.base },
        /* read 的过去式显示仍为 read，但使用 red 的音频以得到 /red/。 */
        { id: \`p\${pairId}-past\`, pairId, type: "past", word: word.past, audioText: word.base === "read" && word.past === "read" ? "red" : word.past }
      ]));
    }

    function wordKey(word) {
      return \`\${word.base}\\u0001\${word.past}\\u0001\${word.meaning}\`;
    }

    function drawNextStandardRound(resetHistory = false, pool = null) {
      if (resetHistory) lastStandardRoundKeys = new Set();
      const source = pool || currentWords;
      const fresh = shuffle(source.filter(word => !lastStandardRoundKeys.has(wordKey(word))));
      const previous = shuffle(source.filter(word => lastStandardRoundKeys.has(wordKey(word))));
      /* 词库达到 30 组时可完全避开上一轮；不足 30 组时只补入不可避免的重复词。 */
      const picked = [...fresh, ...previous].slice(0, 15);
      lastStandardRoundKeys = new Set(picked.map(wordKey));
      return picked.map(word => ({ ...word }));
    }

    function prepareRound(words = currentWords, retry = false) {
      stopTimer();
      stopAllAudio();
      gameActive = false;
      inputLocked = false;
      selectedCards = [];
      matchedPairs = 0;
      wrongClicks = 0;
      wrongPairIds = new Set();
      elapsedSeconds = 0;
      isRetryRound = retry;
      roundWords = words.map(word => ({ ...word }));
      cards = buildDeck(roundWords);
      elements.timer.textContent = "00:00";
      elements.match.textContent = \`0/\${roundWords.length}\`;
      elements.wrong.textContent = "0";
      elements.roundNote.textContent = retry
        ? \`错词重练 · \${roundWords.length} 组\`
        : \`标准练习 · \${roundWords.length} 组（词库 \${currentWords.length}）\`;
      elements.start.disabled = true;
      elements.start.textContent = "▶ 开始游戏";
      elements.board.classList.add("waiting");
      renderBoard();
      preloadAudio(cards);
    }

    function renderBoard() {
      elements.board.innerHTML = cards.map(card =>
        \`<button class="card" type="button" data-id="\${card.id}" aria-label="单词 \${escapeHtml(card.word)}" disabled>\${escapeHtml(card.word)}</button>\`
      ).join("");
    }

    function audioKey(word) {
      return String(word || "").trim().toLowerCase();
    }

    async function preloadAudio(cardItems) {
      const uniqueWords = [...new Set(cardItems.map(c => c.audioText).filter(Boolean))];
      const token = ++preloadGeneration;
      elements.start.disabled = true;
      elements.waiting.classList.remove("hidden");
      elements.progress.style.width = "100%";
      if (!("speechSynthesis" in window)) {
        elements.audioLabel.textContent = "当前浏览器不支持内置发音";
        elements.waiting.classList.remove("hidden");
        elements.start.disabled = true;
        elements.start.textContent = "发音不可用";
        return;
      }
      if (token !== preloadGeneration) return;
      elements.audioLabel.textContent = uniqueWords.length
        ? "✅ 浏览器发音已就绪（" + uniqueWords.length + " 个词，点击翻牌即发音）"
        : "没有需要发音的单词";
      elements.waiting.classList.add("hidden");
      elements.start.disabled = false;
    }

    function startGame() {
      if (gameActive || elements.start.disabled) return;
      gameActive = true;
      startTime = Date.now();
      timerId = setInterval(updateTimer, 250);
      elements.start.disabled = true;
      elements.start.textContent = "游戏进行中";
      elements.board.classList.remove("waiting");
      elements.board.querySelectorAll(".card").forEach(card => card.disabled = false);
      showToast("开始！点击顺序不限，找出正确搭档 🎯");
    }

    function updateTimer() {
      elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
      elements.timer.textContent = formatTime(elapsedSeconds);
    }

    function stopTimer() {
      if (timerId) clearInterval(timerId);
      timerId = null;
    }

    function formatTime(seconds) {
      const mins = String(Math.floor(seconds / 60)).padStart(2, "0");
      const secs = String(seconds % 60).padStart(2, "0");
      return \`\${mins}:\${secs}\`;
    }

    function handleCardClick(event) {
      const button = event.target.closest(".card");
      if (!button || !gameActive || inputLocked || button.classList.contains("matched") || button.classList.contains("selected")) return;
      const card = cards.find(item => item.id === button.dataset.id);
      if (!card) return;

      button.classList.add("selected");
      selectedCards.push({ card, button });
      queueWordAudio(card.audioText);
      if (selectedCards.length === 2) evaluateSelection();
    }

    function evaluateSelection() {
      inputLocked = true;
      const [first, second] = selectedCards;
      const correct = first.card.pairId === second.card.pairId && first.card.type !== second.card.type;
      if (correct) {
        first.button.classList.add("matched");
        second.button.classList.add("matched");
        playEffect("correct");
        matchedPairs++;
        elements.match.textContent = \`\${matchedPairs}/\${roundWords.length}\`;
        setTimeout(() => {
          first.button.disabled = true;
          second.button.disabled = true;
          selectedCards = [];
          inputLocked = false;
          if (matchedPairs === roundWords.length) finishGame();
        }, 630);
      } else {
        first.button.classList.add("wrong");
        second.button.classList.add("wrong");
        playEffect("wrong");
        wrongClicks++;
        wrongPairIds.add(first.card.pairId);
        wrongPairIds.add(second.card.pairId);
        elements.wrong.textContent = wrongClicks;
        setTimeout(() => {
          first.button.classList.remove("selected", "wrong");
          second.button.classList.remove("selected", "wrong");
          selectedCards = [];
          inputLocked = false;
        }, 540);
      }
    }

    function stopActiveAudio() {
      audioPlayToken++;
      if ("speechSynthesis" in window) speechSynthesis.cancel();
    }

    function queueWordAudio(word) {
      if (!word) return;
      stopActiveAudio();
      speakWord(word);
    }

    function pickNaturalEnglishVoice() {
      if (!("speechSynthesis" in window) || !speechSynthesis.getVoices) return null;
      const voices = speechSynthesis.getVoices();
      const englishVoices = voices.filter(voice => /^en([-_]|$)/i.test(voice.lang || "") || /english/i.test(voice.name || ""));
      if (!englishVoices.length) return null;
      const preferred = ["jenny", "aria", "guy", "libby", "ryan", "sonia", "ava", "emma", "brian", "daniel", "zira", "mark", "google us english", "google uk english"];
      return englishVoices
        .map(voice => {
          const name = (voice.name || "").toLowerCase();
          const lang = (voice.lang || "").toLowerCase();
          let score = 0;
          if (/natural|neural|online/.test(name)) score += 140;
          preferred.forEach((keyword, index) => { if (name.includes(keyword)) score += 100 - index; });
          if (lang === "en-us") score += 20;
          if (lang.startsWith("en-")) score += 10;
          if (voice.localService) score += 3;
          return { voice, score };
        })
        .sort((a, b) => b.score - a.score)[0].voice;
    }

    function applyNaturalEnglishVoice(utterance, rate = .88) {
      const voice = pickNaturalEnglishVoice();
      if (voice) {
        utterance.voice = voice;
        utterance.lang = voice.lang || "en-US";
      } else {
        utterance.lang = "en-US";
      }
      utterance.rate = rate;
      utterance.pitch = 1;
    }

    function speakWord(word) {
      return new Promise(resolve => {
        if (!("speechSynthesis" in window)) { resolve(); return; }
        const playToken = audioPlayToken;
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(String(word || "").trim());
        applyNaturalEnglishVoice(utterance, .88);
        let settled = false;
        const finish = () => {
          if (settled) return;
          settled = true;
          clearTimeout(timeout);
          resolve();
        };
        utterance.onend = finish;
        utterance.onerror = finish;
        const timeout = setTimeout(() => {
          if (playToken === audioPlayToken) speechSynthesis.cancel();
          finish();
        }, 3000);
        speechSynthesis.speak(utterance);
      });
    }

    function stopAllAudio() {
      stopActiveAudio();
      if ("speechSynthesis" in window) speechSynthesis.cancel();
    }

    function playEffect(kind) {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        const ctx = playEffect.ctx || (playEffect.ctx = new AudioCtx());
        const notes = kind === "correct" ? [523.25, 659.25, 783.99] : [220, 165];
        notes.forEach((frequency, index) => {
          const oscillator = ctx.createOscillator();
          const gain = ctx.createGain();
          oscillator.type = kind === "correct" ? "sine" : "triangle";
          oscillator.frequency.value = frequency;
          gain.gain.setValueAtTime(.0001, ctx.currentTime + index * .1);
          gain.gain.exponentialRampToValueAtTime(.12, ctx.currentTime + index * .1 + .01);
          gain.gain.exponentialRampToValueAtTime(.0001, ctx.currentTime + index * .1 + .15);
          oscillator.connect(gain).connect(ctx.destination);
          oscillator.start(ctx.currentTime + index * .1);
          oscillator.stop(ctx.currentTime + index * .1 + .17);
        });
      } catch (_) {}
    }

    function finishGame() {
      updateTimer();
      stopTimer();
      // 结算时不切断最后一个单词的发音，让它自然播完；新一局/重试/离开页面仍会正常停止音频
      gameActive = false;
      const wrongWords = [...wrongPairIds].sort((a, b) => a - b).map(id => roundWords[id]).filter(Boolean);
      const result = {
        studentName: ($("#studentSelect") && $("#studentSelect").options[$("#studentSelect").selectedIndex] && $("#studentSelect").value) ? $("#studentSelect").options[$("#studentSelect").selectedIndex].textContent : '',
        className: $("#className").value,

<script>
"use strict";

/* =====================================================================
   说明
   ---------------------------------------------------------------------
   本文件为单文件 HTML 游戏，无外部依赖、无需登录、无数据库。
   结构：
     1) STORE   —— localStorage 封装（带内存回退，预览环境也不报错）
     2) AUDIO   —— Web Audio 音效（懒加载 + 自动 resume）
     3) BANKS   —— 四个游戏的题库（数据与逻辑分离，方便你自己改）
     4) GAMES   —— 四个游戏模块（出题 / 渲染 / 判分）
     5) ENGINE  —— 通用引擎（计时、计分、错题记录、课堂模式）
     6) SCREENS —— 首页 / 结果页渲染
   计分逻辑：答对 +本关分值；答错/超时 记入错题，不扣分。
   错题记录：state.wrongList，每条含 {question, your, correct, explain}。
   ===================================================================== */

/* ============ 1) STORE：本地最高分（带内存回退） ============ */
const _mem = {};
const STORE = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return (k in _mem)?_mem[k]:null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ _mem[k]=String(v); } }
};
function getHigh(id){ const v = STORE.get('psr_hs_'+id); return v?parseInt(v,10):0; }
function setHigh(id,score){ if(score>getHigh(id)) STORE.set('psr_hs_'+id, score); }

/* ============ 2) AUDIO：简单音效 ============ */
let audioCtx=null;
function ensureAudio(){
  if(!state.soundOn) return null;
  if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
  if(audioCtx.state==='suspended'){ try{ audioCtx.resume(); }catch(e){} }
  return audioCtx;
}
function tone(freq, start, dur, type, vol){
  const ctx=ensureAudio(); if(!ctx) return;
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type||'sine'; o.frequency.value=freq;
  o.connect(g); g.connect(ctx.destination);
  const t=ctx.currentTime+start;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol||0.18, t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.start(t); o.stop(t+dur+0.02);
}
function sfxClick(){ tone(420,0,0.08,'triangle',0.12); }
function sfxCorrect(){ tone(660,0,0.12,'sine',0.2); tone(880,0.10,0.16,'sine',0.2); }
function sfxWrong(){ tone(200,0,0.18,'sawtooth',0.16); tone(150,0.12,0.2,'sawtooth',0.14); }
function sfxFinish(){ [523,659,784,1046].forEach((f,i)=>tone(f,i*0.12,0.22,'triangle',0.2)); }

/* ============ 3) BANKS：题库（可自由增删修改） ============ */

/* 游戏1 三单雷达：两个池子，运行时随机抽 20 题 */
const RADAR_SINGULAR = ["he","she","it","Tom","Lily","my father","my mother","my teacher",
  "this boy","that girl","my dog","the cat","Ben","Anna","your brother","his sister"];
const RADAR_PLURAL = ["I","you","we","they","Tom and Lily","my friends","the students",
  "these boys","those girls","my parents","cats","dogs","children","Ben and Anna"];

/* 游戏2 Be or Do：句子 + 答案 + 讲解。选项固定为 am/is/are/do/does */
const BEDO_BANK = [
  {s:"I ___ a student.", a:"am", e:"主语 I 的 be 动词用 am。"},
  {s:"She ___ my friend.", a:"is", e:"she 是三单，be 动词用 is。"},
  {s:"They ___ happy.", a:"are", e:"they 是复数，be 动词用 are。"},
  {s:"Tom ___ tall.", a:"is", e:"后面是形容词，单数主语 Tom 用 is。"},
  {s:"We ___ classmates.", a:"are", e:"we 是复数，be 动词用 are。"},
  {s:"___ you like apples?", a:"do", e:"有动作动词 like，疑问句用 do/does；you 用 do。"},
  {s:"___ he like football?", a:"does", e:"有动词 like，he 是三单，疑问句用 does。"},
  {s:"___ Lily play tennis?", a:"does", e:"有动词 play，Lily 是三单，用 does。"},
  {s:"___ they go to school by bus?", a:"do", e:"有动词 go，they 非三单，用 do。"},
  {s:"___ your brother like music?", a:"does", e:"your brother 是三单，用 does。"},
  {s:"My mother ___ a teacher.", a:"is", e:"后面是名词，单数主语用 is。"},
  {s:"The boys ___ in the classroom.", a:"are", e:"后面是地点，复数主语用 are。"},
  {s:"___ your parents work in Guangzhou?", a:"do", e:"有动词 work，your parents 复数，用 do。"},
  {s:"___ the cat sleep on the sofa?", a:"does", e:"有动词 sleep，the cat 是三单，用 does。"},
  {s:"I ___ not from China.", a:"am", e:"否定句，后面是地点，主语 I 用 am。"},
  {s:"He ___ not like fish.", a:"does", e:"有动词 like，he 三单，否定用 does not。"},
  {s:"They ___ not play basketball.", a:"do", e:"有动词 play，they 非三单，否定用 do not。"},
  {s:"She ___ not a doctor.", a:"is", e:"后面是名词，she 三单，否定用 is not。"},
  {s:"You ___ not late.", a:"are", e:"后面是形容词，you 用 are。"},
  {s:"Anna ___ a nurse.", a:"is", e:"后面是名词，Anna 是三单，用 is。"},
  {s:"___ you play the piano?", a:"do", e:"有动词 play，you 用 do。"},
  {s:"The dog ___ hungry.", a:"is", e:"后面是形容词，the dog 是三单，用 is。"}
];

/* 游戏3 加 s 挑战：主语 + 原形 → 正确形式 + 3 个选项 */
const ADDS_BANK = [
  {sub:"He", v:"play", a:"plays", o:["play","plays","playes"], es:false},
  {sub:"She", v:"like", a:"likes", o:["like","likes","likees"], es:false},
  {sub:"Tom", v:"go", a:"goes", o:["go","gos","goes"], es:true},
  {sub:"My mother", v:"watch", a:"watches", o:["watch","watchs","watches"], es:true},
  {sub:"My father", v:"teach", a:"teaches", o:["teach","teachs","teaches"], es:true},
  {sub:"Lily", v:"study", a:"studies", o:["study","studys","studies"], es:true},
  {sub:"Ben", v:"fly", a:"flies", o:["fly","flys","flies"], es:true},
  {sub:"The cat", v:"sleep", a:"sleeps", o:["sleep","sleeps","sleepes"], es:false},
  {sub:"My dog", v:"run", a:"runs", o:["run","runs","runnes"], es:false},
  {sub:"Anna", v:"read", a:"reads", o:["read","reads","reades"], es:false},
  {sub:"She", v:"do", a:"does", o:["do","dos","does"], es:true},
  {sub:"It", v:"cry", a:"cries", o:["cry","crys","cries"], es:true},
  {sub:"My sister", v:"wash", a:"washes", o:["wash","washs","washes"], es:true},
  {sub:"I", v:"play", a:"play", o:["play","plays","playes"], es:false, base:true},
  {sub:"You", v:"like", a:"like", o:["like","likes","likees"], es:false, base:true},
  {sub:"We", v:"go", a:"go", o:["go","goes","gos"], es:false, base:true},
  {sub:"They", v:"watch", a:"watch", o:["watch","watches","watchs"], es:false, base:true},
  {sub:"The students", v:"study", a:"study", o:["study","studies","studys"], es:false, base:true},
  {sub:"My friends", v:"read", a:"read", o:["read","reads","reades"], es:false, base:true},
  {sub:"Tom and Lily", v:"play", a:"play", o:["play","plays","playes"], es:false, base:true}
];

/* 游戏4 改错小侦探：句子拆成单词，找出错词并改正
   words: 单词数组  wrongIndex: 错词下标  fix: 正确答案
   options: 3 个修改选项（含正确答案）  correct: 正确句子  e: 中文讲解 */
const DETECTIVE_BANK = [
  {words:["He","like","apples."], wrongIndex:1, fix:"likes", options:["likes","liked","liking"],
   correct:"He likes apples.", e:"主语 he 是三单，动词加 s：like → likes。"},
  {words:["She","play","tennis."], wrongIndex:1, fix:"plays", options:["plays","playing","played"],
   correct:"She plays tennis.", e:"主语 she 是三单，动词加 s：play → plays。"},
  {words:["Tom","go","to","school","by","bus."], wrongIndex:1, fix:"goes", options:["goes","gos","going"],
   correct:"Tom goes to school by bus.", e:"Tom 是三单，以 o 结尾加 es：go → goes。"},
  {words:["My","mother","watch","TV","every","evening."], wrongIndex:2, fix:"watches", options:["watches","watchs","watching"],
   correct:"My mother watches TV every evening.", e:"三单主语，以 ch 结尾加 es：watch → watches。"},
  {words:["Lily","study","English","on","Monday."], wrongIndex:1, fix:"studies", options:["studies","studys","studied"],
   correct:"Lily studies English on Monday.", e:"Lily 三单，辅音+y 变 y 为 i 加 es：study → studies。"},
  {words:["Does","he","likes","football?"], wrongIndex:2, fix:"like", options:["like","liking","liked"],
   correct:"Does he like football?", e:"用了 does，后面动词要用原形：likes → like。"},
  {words:["Does","Tom","plays","basketball?"], wrongIndex:2, fix:"play", options:["play","playing","played"],
   correct:"Does Tom play basketball?", e:"用了 does，动词用原形：plays → play。"},
  {words:["Do","she","like","cats?"], wrongIndex:0, fix:"Does", options:["Does","Is","Are"],
   correct:"Does she like cats?", e:"she 是三单，疑问句助动词用 Does，不用 Do。"},
  {words:["Does","they","play","football?"], wrongIndex:0, fix:"Do", options:["Do","Are","Is"],
   correct:"Do they play football?", e:"they 是非三单，助动词用 Do，不用 Does。"},
  {words:["He","don't","like","fish."], wrongIndex:1, fix:"doesn't", options:["doesn't","isn't","aren't"],
   correct:"He doesn't like fish.", e:"he 是三单，否定用 doesn't，不用 don't。"},
  {words:["She","doesn't","likes","milk."], wrongIndex:2, fix:"like", options:["like","liking","liked"],
   correct:"She doesn't like milk.", e:"用了 doesn't，动词用原形：likes → like。"},
  {words:["They","doesn't","go","to","school","on","Sunday."], wrongIndex:1, fix:"don't", options:["don't","isn't","aren't"],
   correct:"They don't go to school on Sunday.", e:"they 是非三单，否定用 don't，不用 doesn't。"},
  {words:["I","is","a","student."], wrongIndex:1, fix:"am", options:["am","are","be"],
   correct:"I am a student.", e:"主语 I 的 be 动词用 am。"},
  {words:["He","are","my","friend."], wrongIndex:1, fix:"is", options:["is","am","be"],
   correct:"He is my friend.", e:"he 是三单，be 动词用 is。"},
  {words:["They","is","happy."], wrongIndex:1, fix:"are", options:["are","am","be"],
   correct:"They are happy.", e:"they 是复数，be 动词用 are。"}

/* ============ 工具函数 ============ */
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function pick(arr,n){ return shuffle(arr).slice(0,n); }

/* ============ 4) GAMES：四个游戏模块 ============
   每个模块约定：
     id, name, emoji, theme, time(秒), count(题数), points(每题分)
     build()                -> 返回本局题目数组（题目对象）
     prompt(q)              -> 错题列表里显示的题面文字
     render(q, area, done)  -> 渲染一题，答完调用 done(correct, yourStr, correctStr, explain)
                               返回 onTimeout 函数（超时时由引擎调用）
   ============================================================ */

/* ---- 通用：高亮选中按钮、禁用全部、显示对错 ---- */
function lockOptions(buttons){ buttons.forEach(b=>b.disabled=true); }

const GAMES = {
  /* ===== 游戏1：三单雷达 ===== */
  radar:{
    id:"radar", name:"三单雷达", emoji:"📡", theme:"radar",
    desc:"主语闪现，5 秒内判断是不是第三人称单数（he/she/it/单数）。",
    time:5, count:20, points:10,
    build(){
      // 三单 + 非三单 混合，打乱后取 count 题
      const pool = RADAR_SINGULAR.map(s=>({subject:s,isSingular:true}))
                 .concat(RADAR_PLURAL.map(s=>({subject:s,isSingular:false})));
      return pick(pool, this.count);
    },
    prompt(q){ return q.subject; },
    render(q, area, done){
      area.innerHTML =
        '<div class="subject-big">'+q.subject+'</div>'+
        '<div class="options">'+
          '<button class="opt big" data-v="1">三单 ✅</button>'+
          '<button class="opt big" data-v="0">非三单 🚫</button>'+
        '</div>'+
        '<div class="feedback"></div>';
      const btns=[...area.querySelectorAll('.opt')];
      const fb=area.querySelector('.feedback');
      const correctStr = q.isSingular ? "三单" : "非三单";
      const explain = q.isSingular
        ? "he/she/it、单个人名、单数名词 → 三单。"
        : "I/you/we/they、复数、两人或以上 → 非三单。";
      function answer(chosen, btn){
        // 注意：chosen===null 表示超时未作答，必须判错
        const correct = (chosen!==null) && ((chosen===1)===q.isSingular);
        lockOptions(btns);
        // 标出正确按钮
        btns.forEach(b=>{ if((b.dataset.v==='1')===q.isSingular) b.classList.add('correct'); });
        if(!correct && btn) btn.classList.add('wrong');
        fb.className='feedback '+(correct?'ok':'no');
        fb.textContent = correct ? "答对啦！" : ("正确答案：" + correctStr);
        done(correct, chosen===null?"⏰ 超时":(chosen===1?"三单":"非三单"), correctStr, explain);
      }
      btns.forEach(b=> b.addEventListener('click',()=>{ sfxClick(); answer(parseInt(b.dataset.v,10), b); }));
      return ()=>answer(null,null); // 超时
    }
  },

  /* ===== 游戏2：Be or Do ===== */
  beordo:{
    id:"beordo", name:"Be or Do", emoji:"🤔", theme:"beordo",
    desc:"补全句子：am / is / are / do / does，分清 be 动词句和实义动词句。",
    time:8, count:20, points:10,
    build(){ return pick(BEDO_BANK, Math.min(this.count, BEDO_BANK.length)); },
    prompt(q){ return q.s.replace("___","____"); },
    render(q, area, done){
      const sentence = q.s.replace("___",'<span class="blank">?</span>');
      const opts=["am","is","are","do","does"];
      area.innerHTML =
        '<div class="sentence-big">'+sentence+'</div>'+
        '<div class="options">'+ opts.map(o=>'<button class="opt" data-v="'+o+'">'+o+'</button>').join('') +'</div>'+
        '<div class="feedback"></div>';
      const btns=[...area.querySelectorAll('.opt')];
      const fb=area.querySelector('.feedback');
      function answer(chosen, btn){
        const correct = chosen===q.a;
        lockOptions(btns);
        btns.forEach(b=>{ if(b.dataset.v===q.a) b.classList.add('correct'); });
        if(!correct && btn) btn.classList.add('wrong');
        fb.className='feedback '+(correct?'ok':'no');
        fb.innerHTML = (correct?"答对啦！":"正确答案：<b>"+q.a+"</b>") + "　" + q.e;
        done(correct, chosen===null?"⏰ 超时":chosen, q.a, q.e);
      }
      btns.forEach(b=> b.addEventListener('click',()=>{ sfxClick(); answer(b.dataset.v, b); }));
      return ()=>answer(null,null);
    }
  },

  /* ===== 游戏3：加 s 挑战 ===== */
  adds:{
    id:"adds", name:"加 s 挑战", emoji:"➕", theme:"adds",
    desc:"主语 + 动词原形，选出正确形式（原形 / +s / +es / +ies）。",
    time:8, count:20, points:10,
    build(){ return pick(ADDS_BANK, Math.min(this.count, ADDS_BANK.length)); },
    prompt(q){ return q.sub+" + "+q.v; },
    render(q, area, done){
      const opts = shuffle(q.o);
      area.innerHTML =
        '<div class="verb-cue">动词原形：<b>'+q.v+'</b></div>'+
        '<div class="subject-big" style="margin-bottom:18px">'+q.sub+' ____</div>'+
        '<div class="options">'+ opts.map(o=>'<button class="opt" data-v="'+o+'">'+o+'</button>').join('') +'</div>'+
        '<div class="feedback"></div>';
      const btns=[...area.querySelectorAll('.opt')];
      const fb=area.querySelector('.feedback');
      // 答对/答错讲解
      const okMsg = "Great! 三单主语后面动词要变化。";
      const baseMsg = "非三单主语，动词用原形。";
      const ruleMsg = "注意：he/she/it/单个人或物 是三单，动词要加 s / es / ies。";
      function answer(chosen, btn){
        const correct = chosen===q.a;
        lockOptions(btns);
        btns.forEach(b=>{ if(b.dataset.v===q.a) b.classList.add('correct'); });
        if(!correct && btn) btn.classList.add('wrong');
        fb.className='feedback '+(correct?'ok':'no');
        let exp = q.base ? baseMsg : (q.es ? "以 s/x/ch/sh/o 或 辅音+y 结尾，要加 es / ies。" : "一般情况，动词加 s。");
        fb.innerHTML = (correct ? (q.base?okMsg+" "+baseMsg:okMsg) : ruleMsg) + "　正确：<b>"+q.a+"</b>";
        done(correct, chosen===null?"⏰ 超时":chosen, q.a, exp);
      }
      btns.forEach(b=> b.addEventListener('click',()=>{ sfxClick(); answer(b.dataset.v, b); }));
      return ()=>answer(null,null);
    }
  },

  /* ===== 游戏4：改错小侦探（两步：找错词 → 选改法） ===== */
  detective:{
    id:"detective", name:"改错小侦探", emoji:"🔍", theme:"detective",
    desc:"句子有一个错误！先点出错的单词，再选出正确的改法。",
    time:12, count:15, points:15,
    build(){ return pick(DETECTIVE_BANK, Math.min(this.count, DETECTIVE_BANK.length)); },
    prompt(q){ return q.words.join(" "); },
    render(q, area, done){
      let phase=1; // 1=找错词  2=选改法
      area.innerHTML =
        '<div class="hint" id="dHint">第 1 步：点出句子里 <b>错误</b> 的那个单词</div>'+
        '<div class="word-sentence" id="dWords"></div>'+
        '<div class="options hidden" id="dFix"></div>'+
        '<div class="feedback"></div>';
      const wrap=area.querySelector('#dWords');
      const fixBox=area.querySelector('#dFix');
      const hint=area.querySelector('#dHint');
      const fb=area.querySelector('.feedback');
      const wordBtns=[];
      q.words.forEach((w,i)=>{
        const b=document.createElement('button');
        b.className='word'; b.textContent=w; b.dataset.i=i;
        b.addEventListener('click',()=>{ if(phase===1){ sfxClick(); pickWord(i,b); } });
        wrap.appendChild(b); wordBtns.push(b);
      });

      // 最终结算（对错都走这里）
      let finished=false;
      function finish(correct, yourStr){
        if(finished) return; finished=true;
        wordBtns.forEach(b=>b.disabled=true);
        // 高亮真正的错词
        wordBtns[q.wrongIndex].classList.add(correct?'right':'miss');
        fb.className='feedback '+(correct?'ok':'no');
        fb.innerHTML = (correct?"破案成功！":"正确句子：<b>"+q.correct+"</b>") + "　" + q.e;
        done(correct, yourStr, q.fix, q.e);
      }

      // 第 1 步：点单词
      function pickWord(i,btn){
        if(i!==q.wrongIndex){
          // 点错了单词 —— 直接判错
          btn.classList.add('miss');
          wordBtns[q.wrongIndex].classList.add('right');
          finish(false, "点错单词：" + q.words[i]);
          return;
        }
        // 点对错词，进入第 2 步
        phase=2;
        btn.classList.add('picked');
        wordBtns.forEach(b=>{ if(b!==btn) b.disabled=true; });
        hint.innerHTML='第 2 步：把 “<b>'+q.words[i]+'</b>” 改成正确的写法';
        const opts=shuffle(q.options);
        fixBox.classList.remove('hidden');
        fixBox.innerHTML = opts.map(o=>'<button class="opt" data-v="'+o+'">'+o+'</button>').join('');
        const fbtns=[...fixBox.querySelectorAll('.opt')];
        fbtns.forEach(fbn=> fbn.addEventListener('click',()=>{
          sfxClick();
          const correct = fbn.dataset.v===q.fix;
          lockOptions(fbtns);
          fbtns.forEach(x=>{ if(x.dataset.v===q.fix) x.classList.add('correct'); });
          if(!correct) fbn.classList.add('wrong');
          finish(correct, fbn.dataset.v);
        }));
      }

      // 超时：揭示答案算错
      return ()=>{
        wordBtns.forEach(b=>b.disabled=true);
        if(fixBox) fixBox.querySelectorAll('.opt').forEach(b=>b.disabled=true);
        finish(false, "⏰ 超时");
      };
    }
  }
};

/* ============ 5) ENGINE：通用引擎 ============ */
const state = {
  classroomMode:false,
  soundOn:true,
  game:null,
  questions:[],
  index:0,
  score:0,
  correctCount:0,
  wrongList:[],
  timerInt:null,
  advanceTimer:null,   /* 答题后自动跳题的定时器，离开游戏时需清除 */
  timeLeft:0,
  isWrongReplay:false
};

const app = document.getElementById('app');

/* =====================================================================
   桥接：与父页面（积分系统）通讯
   - 加载时向父页面请求数据（班级 / 学生）
   - 选择班级 -> 通知父页面切换班级
   - 选择学生 -> 解锁闯关
   - 结算时 -> 提交得分（计入“互动”）+ 提交错题（写入日志）
   ===================================================================== */
const _bridge = { classes:[], currentClassId:null, students:[], selectedStudentId:null };

function isInIframe(){ try{ return window.parent && window.parent !== window; }catch(e){ return false; } }

function studentSelected(){ return !!_bridge.selectedStudentId; }
function selectedStudentName(){
  const s = _bridge.students.find(function(x){ return x.id === _bridge.selectedStudentId; });
  return s ? s.name : '';
}

function updateBridgeHint(){
  const hint = document.getElementById('bridgeHint');
  if(!hint) return;
  if(studentSelected()){
    hint.textContent = '当前闯关学生：' + selectedStudentName() + '　点击下方关卡开始';
    hint.classList.add('ready');
  }else{
    hint.textContent = '请先选择学生，再开始闯关';
    hint.classList.remove('ready');
  }
}

function populateClassSelect(){
  const sel = document.getElementById('classSelect');
  if(!sel) return;
  const cur = _bridge.currentClassId;
  sel.innerHTML = '<option value="">选择班级</option>';
  _bridge.classes.forEach(function(c){
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = c.name;
    if(c.id === cur) opt.selected = true;
    sel.appendChild(opt);
  });
  if(cur) sel.value = cur;
}

function populateStudentSelect(){
  const sel = document.getElementById('studentSelect');
  if(!sel) return;
  const prev = _bridge.selectedStudentId;
  sel.innerHTML = '<option value="">请选择学生</option>';
  _bridge.students.forEach(function(s){
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.avatar ? (s.avatar + ' ' + s.name) : s.name;
    if(s.id === prev) opt.selected = true;
    sel.appendChild(opt);
  });
  // 若之前选中的学生仍在列表中，保持选中；否则清空
  if(prev && _bridge.students.some(function(s){ return s.id === prev; })){
    sel.value = prev;
    _bridge.selectedStudentId = prev;
  }else{
    sel.value = '';
    _bridge.selectedStudentId = null;
  }
  updateBridgeHint();
}

function applyBridgeData(payload){
  if(!payload) return;
  _bridge.classes = payload.classes || [];
  _bridge.currentClassId = payload.currentClassId || null;
  _bridge.students = payload.students || [];
  populateClassSelect();
  populateStudentSelect();
}

function onClassChange(classId){
  _bridge.selectedStudentId = null;
  if(isInIframe() && classId){
    window.parent.postMessage({ type:'tense:switchClass', classId:classId }, '*');
  }
}

function onStudentSelect(studentId){
  _bridge.selectedStudentId = studentId || null;
  updateBridgeHint();
}

function requestBridgeData(){
  if(isInIframe()){
    window.parent.postMessage({ type:'tense:requestData' }, '*');
  }
}

/* 结算时提交：得分计入“互动”，错题写入日志（仅正式闯关，不含错题重练） */
function submitResultToParent(){
  if(!isInIframe()) return;
  if(state.isWrongReplay) return;          // 错题重练不重复计分
  const sid = _bridge.selectedStudentId;
  if(!sid) return;
  const g = state.game;
  const levelName = g ? g.name : '一般现在时闯关';
  // 1) 提交得分（计入“互动”）
  if(state.score > 0){
    window.parent.postMessage({ type:'tense:addScore', studentId:sid, score:state.score, level:levelName }, '*');
  }
  // 2) 提交错题（写入日志）
  if(state.wrongList && state.wrongList.length){
    const items = state.wrongList.map(function(w){ return String(w.prompt || ''); }).filter(Boolean);
    if(items.length){
      window.parent.postMessage({ type:'tense:addWrongItems', studentId:sid, level:levelName, items:items }, '*');
    }
  }
}

// 接收父页面数据
window.addEventListener('message', function(ev){
  const msg = ev && ev.data;
  if(!msg || typeof msg !== 'object') return;
  if(msg.type === 'tense:data'){ applyBridgeData(msg.payload); }
  else if(msg.type === 'tense:refresh'){ requestBridgeData(); }
});

// 绑定下拉框事件 + 启动请求
(function initBridge(){
  const classSel = document.getElementById('classSelect');
  const stuSel = document.getElementById('studentSelect');
  if(classSel){ classSel.addEventListener('change', function(){ onClassChange(this.value); }); }
  if(stuSel){ stuSel.addEventListener('change', function(){ onStudentSelect(this.value); }); }
  requestBridgeData();
})();

/* 启动一局游戏。questions 可传入（错题重练时） */
function startGame(gameId, questions){
  // 必须先选择学生才能闯关
  if(isInIframe() && !studentSelected()){
    updateBridgeHint();
    try{ alert('请先在上方选择「学生」，再开始闯关。'); }catch(e){}
    const ss = document.getElementById('studentSelect');
    if(ss) ss.focus();
    return;
  }
  // 清除上一局可能残留的定时器，避免竞态
  clearInterval(state.timerInt); clearTimeout(state.advanceTimer);
  const g = GAMES[gameId];
  state.game = g;
  state.questions = questions ? questions.slice() : g.build();
  state.index = 0; state.score = 0; state.correctCount = 0; state.wrongList = [];
  state.isWrongReplay = !!questions;
  renderGameShell();
  startQuestion();
}

/* 渲染游戏外壳（顶栏 + 计时条 + 题目容器） */
function renderGameShell(){
  const g=state.game;
  app.innerHTML =
    '<div class="gamewrap" data-theme="'+g.theme+'">'+
      '<div class="topbar">'+
        '<span class="gname">'+g.emoji+' '+g.name+(state.isWrongReplay?'（错题重练）':'')+'</span>'+
        '<span class="spacer"></span>'+
        '<span class="pill" id="pProgress"></span>'+
        '<span class="pill" id="pScore"></span>'+
        '<span class="pill" id="pTime"></span>'+
        '<button class="btn btn-home" id="btnHome">🏠 首页</button>'+
      '</div>'+
      '<div class="timerbar" id="timerbar"><div class="timerfill" id="timerfill"></div></div>'+
      '<div class="qarea" id="qarea"></div>'+
      '<div style="text-align:center"><button class="btn next-btn" id="nextBtn">下一题 ▶</button></div>'+
    '</div>';
  document.getElementById('btnHome').addEventListener('click', renderHome);
  document.getElementById('nextBtn').addEventListener('click', ()=>{ sfxClick(); nextQuestion(); });
}

function updateStatsBar(){
  document.getElementById('pProgress').textContent = '题 '+(state.index+1)+'/'+state.questions.length;
  document.getElementById('pScore').textContent = '⭐ '+state.score;
  document.getElementById('pTime').textContent = '⏱ '+Math.ceil(state.timeLeft)+'s';
}

/* 出一题 */
function startQuestion(){
  // 清除上一题排队的自动跳题定时器
  clearTimeout(state.advanceTimer);
  const g=state.game;
  const q=state.questions[state.index];
  const area=document.getElementById('qarea');
  const nextBtn=document.getElementById('nextBtn');
  // 防御：若已离开游戏（如返回首页），题目容器不存在则直接退出
  if(!area || !nextBtn) return;
  nextBtn.style.display='none';
  area.classList.remove('flash-ok','flash-no');

  let answered=false;

  // 答题回调（由各游戏模块调用）
  function done(correct, yourStr, correctStr, explain){
    if(answered) return; answered=true;
    clearInterval(state.timerInt);
    if(correct){
      state.score += g.points;
      state.correctCount++;
      sfxCorrect();
      area.classList.add('flash-ok');
      starBurst(area);
    }else{
      sfxWrong();
      area.classList.add('flash-no');
      // 记录错题（保存原始 question 以便重练）
      state.wrongList.push({ question:q, prompt:g.prompt(q), your:yourStr, correct:correctStr, explain:explain });
    }
    updateStatsBar();
    // 进入下一题：课堂模式等老师点击；否则 1 秒后自动
    if(state.classroomMode){
      nextBtn.style.display='inline-block';
    }else{
      state.advanceTimer = setTimeout(nextQuestion, 1000);
    }
  }

  const onTimeout = g.render(q, area, done);
  updateStatsBar();

  // 计时器（0.1s 步进，平滑进度条）
  state.timeLeft = g.time;
  const fill=document.getElementById('timerfill');
  const bar=document.getElementById('timerbar');
  bar.classList.remove('warn');
  fill.style.width='100%';
  clearInterval(state.timerInt);
  state.timerInt=setInterval(()=>{
    state.timeLeft -= 0.1;
    if(state.timeLeft<0) state.timeLeft=0;
    const pct=(state.timeLeft/g.time)*100;
    fill.style.width=pct+'%';
    if(pct<=33) bar.classList.add('warn');
    document.getElementById('pTime').textContent='⏱ '+Math.ceil(state.timeLeft)+'s';
    if(state.timeLeft<=0){
      clearInterval(state.timerInt);
      if(!answered && typeof onTimeout==='function') onTimeout();
    }
  },100);
}

function nextQuestion(){
  // 防御：若已不在游戏中（如已返回首页 / 已结束），不再推进
  if(!state.game || !document.getElementById('qarea')) return;
  state.index++;
  if(state.index>=state.questions.length){ showResult(); }
  else{ startQuestion(); }
}

/* 星星爆炸特效 */
function starBurst(area){
  const stars=['⭐','✨','🌟','💫'];
  for(let i=0;i<6;i++){
    const s=document.createElement('span');
    s.className='star-pop'; s.textContent=stars[i%stars.length];
    s.style.left=(30+Math.random()*40)+'%';
    s.style.top=(40+Math.random()*20)+'%';
    s.style.animationDelay=(Math.random()*0.15)+'s';
    area.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}

/* ---------- 结果页 ---------- */
function showResult(){
  clearInterval(state.timerInt);
  clearTimeout(state.advanceTimer);
  const g=state.game;
  const total=state.questions.length;
  const correct=state.correctCount;
  const rate = total? Math.round(correct/total*100) : 0;

  // 星级评价
  let stars, rank;
  if(rate>=90){ stars='⭐⭐⭐'; rank='Grammar Master'; }
  else if(rate>=70){ stars='⭐⭐'; rank='Keep practising'; }
  else { stars='⭐'; rank='Need review'; }

  // 最高分（错题重练不计入最高分）
  if(!state.isWrongReplay) setHigh(g.id, state.score);
  sfxFinish();

  // 向父页面（积分系统）提交本关成绩与错题
  submitResultToParent();

  // 错题列表
  let wrongHtml='';
  if(state.wrongList.length){
    wrongHtml = '<div class="wrongtable"><h4>📋 错题回顾（'+state.wrongList.length+' 题）</h4>'+
      state.wrongList.map(w=>(
        '<div class="wrong-item">'+
          '<div class="q">题目：'+w.prompt+'</div>'+
          '<div>你的选择：<span class="your">'+w.your+'</span>　|　正确：<span class="cor">'+w.correct+'</span></div>'+
          '<div class="ex">💡 '+w.explain+'</div>'+
        '</div>'
      )).join('')+'</div>';
  }else{
    wrongHtml = '<div class="review-tip">🎉 全部答对，没有错题！太棒啦！</div>';
  }

  // 建议复习点
  const reviewTip = '<div class="review-tip"><b>建议复习点：</b>'+ buildReviewTip(g.id, rate) +'</div>';

  // 家长反馈文案
  const parentText = buildParentText(g, total, correct, rate);

  // 只练错题按钮
  const wrongBtn = state.wrongList.length
    ? '<button class="btn b-wrong" id="bWrong">只练错题（'+state.wrongList.length+'）</button>' : '';

  // 提交确认横幅（仅在嵌入积分系统且非错题重练时显示）
  let submitBanner = '';
  if(isInIframe() && !state.isWrongReplay && _bridge.selectedStudentId){
    const nm = selectedStudentName();

/* 根据游戏与正确率生成「建议复习点」 */
function buildReviewTip(id, rate){
  const tips={
    radar:"判断三单的口诀——he / she / it、单个人名、单数名词是三单；I / you / we / they、复数、两人或以上是非三单。",
    beordo:"句子后面是名词 / 形容词 / 地点，用 be 动词（am/is/are）；句子里有动作动词（like, play, go…），疑问或否定要用 do / does，三单用 does。",
    adds:"三单肯定句动词变化：一般加 s；s/x/ch/sh/o 结尾加 es；辅音 + y 变 y 为 i 再加 es；非三单用原形。",
    detective:"重点辨析：用了 do/does/don't/doesn't 之后，动词要回到原形；三单主语用 does / doesn't；非三单用 do / don't。"
  };
  let base=tips[id]||"";
  if(rate>=90) base="掌握得很好，可以适当提速或挑战更难题目巩固。"+base;
  else if(rate<70) base="本关掌握还不牢，建议先慢速重做一遍：" + base;
  return base;
}

/* 生成家长反馈文案 */
function buildParentText(g, total, correct, rate){
  const focusMap={
    radar:"三单主语的判断",
    beordo:"be 动词与 do/does 的区分",
    adds:"三单动词加 s / es / ies 的变化",
    detective:"一般现在时句子的纠错（助动词后动词用原形、三单 does/doesn't 等）"
  };
  const focus=focusMap[g.id];
  // 错题集中点：取出现最多的讲解关键词，简单用前几条错题
  let weak;
  if(state.wrongList.length===0){
    weak="本次没有错题，掌握情况很好";
  }else{
    weak="错题主要集中在「"+focus+"」，例如："+ state.wrongList.slice(0,3).map(w=>w.prompt).join("；");
  }
  const suggest = rate>=90 ? "可以进入下一单元，保持复习即可"
                : rate>=70 ? "建议课后再练一遍同类题型加深印象"
                : "建议课后重点复习并重做错题";
  return "今天孩子完成了一般现在时基础训练（"+g.name+"），主要练习了"+focus+"。本次共 "+total+
    " 题，答对 "+correct+" 题，正确率 "+rate+"%。"+weak+"。"+suggest+"。";
}

  }

  if(!sel) return;
  const cur = _bridge.currentClassId;
  sel.innerHTML = '<option value="">选择班级</option>';
  _bridge.classes.forEach(function(c){
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = c.name;
    if(c.id === cur) opt.selected = true;
    sel.appendChild(opt);
  });
  if(cur) sel.value = cur;
}

function populateStudentSelect(){
  const sel = document.getElementById('studentSelect');
  if(!sel) return;
  const prev = _bridge.selectedStudentId;
  sel.innerHTML = '<option value="">请选择学生</option>';
  _bridge.students.forEach(function(s){
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.avatar ? (s.avatar + ' ' + s.name) : s.name;
    if(s.id === prev) opt.selected = true;
    sel.appendChild(opt);
  });
  // 若之前选中的学生仍在列表中，保持选中；否则清空
  if(prev && _bridge.students.some(function(s){ return s.id === prev; })){
    sel.value = prev;
    _bridge.selectedStudentId = prev;
  }else{
    sel.value = '';
    _bridge.selectedStudentId = null;
  }
  updateBridgeHint();
}

function applyBridgeData(payload){
  if(!payload) return;
  _bridge.classes = payload.classes || [];
  _bridge.currentClassId = payload.currentClassId || null;
  _bridge.students = payload.students || [];
  populateClassSelect();
  populateStudentSelect();
}

function onClassChange(classId){
  _bridge.selectedStudentId = null;
  if(isInIframe() && classId){
    window.parent.postMessage({ type:'pctense:switchClass', classId:classId }, '*');
  }
}

function onStudentSelect(studentId){
  _bridge.selectedStudentId = studentId || null;
  updateBridgeHint();
}

function requestBridgeData(){
  if(isInIframe()){
    window.parent.postMessage({ type:'pctense:requestData' }, '*');
  }
}

/* 结算时提交：得分计入"互动"，错题写入日志（仅正式闯关，错题重练不重复计分） */
function submitResultToParent(){
  if(!isInIframe()) return;
  if(state.isRetry) return;                // 错题重练不重复计分 / 不重复记错题
  const sid = _bridge.selectedStudentId;
  if(!sid) return;
  const levelName = state.cfg ? state.cfg.title.replace(/^[^\\u4e00-\\u9fa5A-Za-z]+/, '') : '现在进行时闯关';
  // 1) 提交得分（计入"互动"）
  if(state.score > 0){
    window.parent.postMessage({ type:'pctense:addScore', studentId:sid, score:state.score, level:levelName }, '*');
  }
  // 2) 提交错题（写入日志）
  if(state.wrong && state.wrong.length){
    const items = state.wrong.map(function(w){ return String(w.prompt || ''); }).filter(Boolean);
    if(items.length){
      window.parent.postMessage({ type:'pctense:addWrongItems', studentId:sid, level:levelName, items:items }, '*');
    }
  }
}

// 接收父页面数据
window.addEventListener('message', function(ev){
  const msg = ev && ev.data;
  if(!msg || typeof msg !== 'object') return;
  if(msg.type === 'pctense:data'){ applyBridgeData(msg.payload); }
  else if(msg.type === 'pctense:refresh'){ requestBridgeData(); }
});

/* ============================================================
   2) 工具函数
   ============================================================ */

/* Fisher–Yates 洗牌 */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* 按答案类型打散：贪心重排，尽量让相邻两题答案不同（避免连续都是 is 或都是 are） */
function spreadByKey(items, keyFn){
  const buckets = {};
  items.forEach(it=>{ const k = keyFn(it); (buckets[k] = buckets[k] || []).push(it); });
  Object.keys(buckets).forEach(k=>{ buckets[k] = shuffle(buckets[k]); });
  const result = [];
  let lastKey = null;
  const total = items.length;
  while(result.length < total){
    let keys = Object.keys(buckets).filter(k=>buckets[k].length > 0);
    if(keys.length === 0) break;
    // 选剩余数量最多、且不等于上一题答案的桶；实在没有再退而求其次
    keys.sort((a,b)=>buckets[b].length - buckets[a].length);
    let pick = keys.find(k=>k !== lastKey);
    if(!pick) pick = keys[0];
    result.push(buckets[pick].pop());
    lastKey = pick;
  }
  return result;
}

/* 根据 rule 生成动词的正确 ing 形式 + 干扰项（去重、保证 3 个且都不重复） */
function makeIngOptions(verb, rule){
  const last = verb[verb.length-1];
  const add   = verb + 'ing';               // 直接加：play->playing
  const dropE = verb.slice(0,-1) + 'ing';   // 去尾字母加 ing：make->making
  const dbl   = verb + last + 'ing';        // 双写末字母加 ing：run->running
  const tri   = verb + last + last + 'ing'; // 过度双写：run->runnning

  let correct, wrongs;
  if(rule === 'direct'){        // play->playing, be->being
    correct = add;
    wrongs = [dropE, dbl];
  } else if(rule === 'dropE'){   // make->making
    correct = dropE;
    wrongs = [add, dbl];
  } else if(rule === 'double'){  // run->running
    correct = dbl;
    wrongs = [add, tri];         // runing / runnning
  } else { // 'ee'  see->seeing
    correct = add;               // seeing
    wrongs = [dropE, verb.slice(0,-1) + verb.slice(-1) + 'ng']; // seing / seeng 备用
  }

  // 组装并去重，确保干扰项 ≠ 正确项 且彼此不同
  const set = [];
  const push = w => { if(w && w!==correct && set.indexOf(w)===-1) set.push(w); };
  wrongs.forEach(push);
  // 兜底：若干扰项不足 2 个，补一个明显错误形式
  let filler = 0;
  while(set.length < 2){
    const cand = verb + (filler===0 ? 'ing'+last : 'in'+ 'g'.repeat(filler+1));
    push(cand); filler++;
    if(filler>4) break;
  }
  const options = shuffle([correct, set[0], set[1]].filter(Boolean));
  return {options, correct};
}

/* ---------- 音效（Web Audio，用户点击后懒加载并 resume，避免 suspended） ---------- */
let audioCtx = null;
function ensureAudio(){
  try{
    if(!audioCtx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(AC) audioCtx = new AC();
    }
    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }catch(e){ audioCtx = null; }
}
function tone(freq, start, dur, type, vol){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  o.connect(g); g.connect(audioCtx.destination);
  const t = audioCtx.currentTime + start;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol || 0.2, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t);
  o.stop(t + dur + 0.05);
}
function playSound(kind){
  if(!settings.sound) return;
  ensureAudio();
  if(!audioCtx) return;
  if(kind === 'ok'){        // 上扬双音
    tone(659, 0, 0.13, 'triangle', 0.22);
    tone(988, 0.11, 0.18, 'triangle', 0.22);
  }else if(kind === 'ng'){  // 低沉提示
    tone(196, 0, 0.28, 'sawtooth', 0.15);
  }else if(kind === 'click'){
    tone(523, 0, 0.06, 'sine', 0.12);
  }else if(kind === 'tick'){
    tone(880, 0, 0.05, 'square', 0.06);
  }
}

/* ---------- 星星飞出动画 ---------- */
function starBurst(){
  const stage = document.getElementById('stage');
  const stars = ['⭐','🌟','✨','💫'];
  for(let i=0;i<10;i++){
    const s = document.createElement('span');
    s.className = 'star-burst';
    s.textContent = stars[i % stars.length];
    s.style.left = '50%';
    s.style.top = '40%';
    const ang = Math.random()*Math.PI*2;
    const dist = 120 + Math.random()*160;
    s.style.setProperty('--dx', Math.cos(ang)*dist + 'px');
    s.style.setProperty('--dy', Math.sin(ang)*dist + 'px');
    s.style.setProperty('--rot', (Math.random()*360-180) + 'deg');
    stage.appendChild(s);
    setTimeout(()=>s.remove(), 950);
  }
}
