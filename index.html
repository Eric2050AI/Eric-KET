/* ============================================================
   3) 游戏配置：参数 + 出题函数(build) + 渲染函数(render)
   ============================================================
   每个 render(q) 需在渲染时调用 setMeta(...) 记录本题信息，
   供“计时超时 / 错题记录 / 反馈显示”统一使用。
   判分统一调用 handleResult(isCorrect, yourDisplay)。
*/
/* 句子拼装站共享渲染逻辑（肯定句 / 一般疑问句 共用）
   题库项含标点 end（默认句号），词块池附带正确标点 + 一个干扰标点，
   学生点到标点自动交卷。 */
function buildRender(q){
  const end = q.end || '.';                       // 句末标点，默认句号；疑问句题库设 end:'?'
  const fullAnswer = q.answer.concat([end]);       // 完整答案含标点
  setMeta({
    prompt: q.cn,
    correctDisplay: q.answer.join(' ') + end,
    explain: '现在进行时要有 be 动词、动词变 ing，句末别忘了标点。肯定句：主语+be+doing；一般疑问句：be+主语+doing?',
    type: '句型结构'
  });
  const stage = document.getElementById('stage');
  stage.innerHTML =
    '<div class="prompt-cn">' + esc(q.cn) + '</div>' +
    '<div class="build-answer" id="ansArea"><span class="placeholder">点下面的词块，把句子拼在这里 👇</span></div>' +
    '<div class="build-pool" id="poolArea"></div>' +
    '<div class="build-hint">拼好句子后，点最后的标点符号（。/ ？）就会自动交卷 ✅</div>' +
    '<div class="build-controls">' +
      '<button class="btn btn-yellow" id="undoBtn">↩️ 清空重拼</button>' +
    '</div>';
  const pool = document.getElementById('poolArea');
  const ans = document.getElementById('ansArea');
  const chosen = []; // 已选词块 {id, word, punct}

  // 词块池：先词语（含干扰），标点放最后（正确标点 + 一个干扰标点）
  const wordTokens = shuffle(q.blocks).map((w,idx)=>({id:'w'+idx, word:w, punct:false}));
  const punctTokens = shuffle([end, (end === '.' ? '?' : '.')]).map((p,idx)=>({id:'p'+idx, word:p, punct:true}));
  const tokens = wordTokens.concat(punctTokens);

  tokens.forEach(tk=>{
    const c = document.createElement('button');
    c.className = 'chip pool' + (tk.punct ? ' punct' : '');
    c.textContent = tk.word; c.dataset.id = tk.id;
    c.onclick = ()=>{
      if(state.answered) return;
      playSound('click');
      c.classList.add('used');
      chosen.push(tk);
      renderAns();
      // 点到标点 → 自动提交
      if(tk.punct){
        const got = chosen.map(t=>t.word).join('|');   // 用 | 分隔，词块本身不含 |
        const want = fullAnswer.join('|');
        handleResult(got === want, chosen.map(t=>t.word).join(' '));
      }
    };
    pool.appendChild(c);
  });

  function renderAns(){
    ans.innerHTML = '';
    if(chosen.length === 0){
      ans.innerHTML = '<span class="placeholder">点下面的词块，把句子拼在这里 👇</span>';
      return;
    }
    chosen.forEach((tk, i)=>{
      const c = document.createElement('button');
      c.className = 'chip' + (tk.punct ? ' punct' : '');
      c.textContent = tk.word;
      c.onclick = ()=>{
        if(state.answered) return;
        playSound('click');
        const poolChip = pool.querySelector('[data-id="'+tk.id+'"]');
        if(poolChip) poolChip.classList.remove('used');
        chosen.splice(i,1);
        renderAns();
      };
      ans.appendChild(c);
    });
  }
  document.getElementById('undoBtn').onclick = ()=>{
    if(state.answered) return;
    playSound('click');
    chosen.length = 0;
    pool.querySelectorAll('.chip.pool').forEach(c=>c.classList.remove('used'));
    renderAns();
  };
}

              ob.className = 'opt'; ob.textContent = op;
              ob.style.fontSize = '22px'; ob.style.minWidth='96px'; ob.style.padding='14px 20px';
              ob.onclick = ()=>{
                if(state.answered) return;
                const ok = (op === q.correct);
                Array.from(opts.children).forEach(c=>{
                  c.disabled = true;
                  if(c.textContent === q.correct) c.classList.add('correct');
                  else if(c === ob && !ok) c.classList.add('wrong');
                });
                handleResult(ok, op);
              };
              opts.appendChild(ob);
            });
          }else{
            // 点错了位置 → 直接判错，并高亮真正的错误词
            const realWord = q.words[q.errorIndex];
            sent.querySelectorAll('.word').forEach((x,i)=>{
              if(i === q.errorIndex) x.classList.add('selected');
            });
            handleResult(false, '点错了位置：' + w);
          }
        };
        sent.appendChild(b);
      });
    }
  }
};

/* ing 规则 → 错误类型标签 */
function ingType(rule){
  if(rule === 'dropE')  return '去 e 加 ing 错误';
  if(rule === 'double') return '双写辅音加 ing 错误';
  if(rule === 'ee')     return 'ing 特殊变化';
  return 'ing 直接加错误';
}

/* ============================================================
   4) 通用引擎
   ============================================================ */
const settings = { classroom:false, sound:true };
let state = null;   // 每局运行时状态
let meta  = null;   // 当前题信息（渲染时写入）

/* 供 render 调用，记录当前题目的判分信息 */
function setMeta(m){ meta = m; }

/* HTML 转义，防止题库文本破坏结构 */
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* 首字母大写（句子/主语开头统一大写） */
function capFirst(s){
  s = String(s);
  return s.charAt(0).toUpperCase() + s.slice(1);
}

/* 屏幕切换 */
function showScreen(id){
  ['home','buildMenu','game','result'].forEach(s=>{
    document.getElementById(s).classList.toggle('active', s === id);
  });
  // 首页与拼装站选择页都启用居中布局
  document.body.classList.toggle('home-view', id === 'home' || id === 'buildMenu');
  window.scrollTo(0,0);
}

/* —— 开始一局 ——
   customQuestions：传入则为“只练错题”重练模式 */
function startGame(key, customQuestions){
  // 嵌入积分系统时：必须先选择学生才能闯关
  if(isInIframe() && !studentSelected()){
    updateBridgeHint();
    // 醒目警示：提示条变红抖动 + 滚动到顶部（alert 可能被 sandbox 拦截，作为兜底）
    const hint = document.getElementById('bridgeHint');
    if(hint){
      hint.classList.remove('warn-flash');
      void hint.offsetWidth;               // 强制重绘以重启动画
      hint.classList.add('warn-flash');
    }
    try{ window.scrollTo({top:0, behavior:'smooth'}); }catch(e){ window.scrollTo(0,0); }
    try{ alert('请先在上方选择「学生」，再开始闯关。'); }catch(e){}
    const ss = document.getElementById('studentSelect');
    if(ss) ss.focus();
    return;
  }
  const cfg = GAMES[key];
  const questions = customQuestions ? shuffle(customQuestions) : cfg.build();
  state = {
    key, cfg, questions,
    i:0, score:0, correct:0,
    wrong:[],      // 结果展示用（含 your/correct/explain）
    wrongQ:[],     // 原始题目对象，用于“只练错题”
    answered:false,
    timer:null, timeLeft:0,
    isRetry: !!customQuestions
  };
  document.getElementById('gameTitle').textContent = cfg.title;
  document.getElementById('qTotal').textContent = questions.length;
  showScreen('game');
  renderQuestion();
}

/* —— 出题 —— */
function renderQuestion(){
  state.answered = false;
  meta = null;
  clearFeedback();
  document.getElementById('nextWrap').innerHTML = '';
  document.getElementById('qNow').textContent = state.i + 1;
  updateHUD();
  const stage = document.getElementById('stage');
  stage.className = 'stage';
  const q = state.questions[state.i];
  state.cfg.render(q);       // 各游戏自己渲染，并调用 setMeta
  startTimer(state.cfg.time);
}

/* —— 倒计时逻辑 ——
   每题独立倒计时，归零则按“超时未答”判错 */
function startTimer(sec){
  state.timeLeft = sec;
  const fill = document.getElementById('timerFill');
  fill.classList.remove('warn');
  fill.style.transition = 'none';
  fill.style.width = '100%';
  // 强制重绘后再开启过渡，保证进度条从满格平滑下降
  void fill.offsetWidth;
  fill.style.transition = 'width .95s linear';
  updateTimerUI();
  clearInterval(state.timer);
  state.timer = setInterval(()=>{
    state.timeLeft--;
    updateTimerUI();
    if(state.timeLeft <= 3 && state.timeLeft > 0) playSound('tick');
    if(state.timeLeft <= 0){
      clearInterval(state.timer);
      if(!state.answered) handleResult(false, '(超时未答)');
    }
  }, 1000);
}
function updateTimerUI(){
  const num = document.getElementById('timerNum');
  const fill = document.getElementById('timerFill');
  num.textContent = Math.max(0, state.timeLeft);
  const pct = Math.max(0, state.timeLeft / state.cfg.time * 100);
  fill.style.width = pct + '%';
  fill.classList.toggle('warn', state.timeLeft <= 3);
}
function updateHUD(){
  document.getElementById('score').textContent = state.score;
  document.getElementById('qNow').textContent = Math.min(state.i + 1, state.questions.length);
}

/* —— 统一判分 + 错题记录逻辑 —— */
function handleResult(isCorrect, yourDisplay){
  if(state.answered) return;          // 防止重复触发
  state.answered = true;
  clearInterval(state.timer);
  const stage = document.getElementById('stage');

  if(isCorrect){
    state.score += state.cfg.correctScore;
    state.correct++;
    playSound('ok');
    stage.classList.add('flash-ok');
    starBurst();
    showFeedback(true);
  }else{
    // 记录错题：结果展示 + 原始题目（重练用）
    state.wrong.push({
      prompt: (meta && meta.prompt) || '',
      your: yourDisplay,
      correct: (meta && meta.correctDisplay) || '',
      explain: (meta && meta.explain) || '',
      type: (meta && meta.type) || ''
    });
    state.wrongQ.push(state.questions[state.i]);
    playSound('ng');
    stage.classList.add('shake');
    showFeedback(false);
  }
  updateHUD();

  // 课堂模式：等老师点“下一题”；否则自动进入下一题
  if(settings.classroom){
    const nw = document.getElementById('nextWrap');
    nw.innerHTML = '';
    const btn = document.createElement('button');
    btn.className = 'btn btn-purple big';
    btn.textContent = (state.i + 1 >= state.questions.length) ? '🏁 看看成绩' : '➡️ 下一题';
    btn.onclick = nextQuestion;
    nw.appendChild(btn);
  }else{
    setTimeout(nextQuestion, isCorrect ? 1200 : 2600);
  }
}

/* 反馈显示 */
function showFeedback(ok){
  const fb = document.getElementById('feedback');
  if(ok){
    fb.className = 'feedback ok show';
    const okMsgs = {
      be:'Great! 现在进行时不能漏 be 动词。',
      ing:'Great! 动词 ing 变化正确。',
      build:'Excellent! 结构完整：be + doing。',
      fix:'Nice! 你是改错小侦探 🕵️'
    };
    fb.innerHTML = '✅ ' + esc(okMsgs[state.key] || '答对啦！');
  }else{
    fb.className = 'feedback ng show';
    fb.innerHTML =
      '❌ 正确答案：<span class="ans">' + esc(meta ? meta.correctDisplay : '') + '</span><br>' +
      '💡 ' + esc(meta ? meta.explain : '');
  }
}
function clearFeedback(){
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';
}

/* 选项按钮着色（选择题通用） */
function markOptButtons(row, chosen, correct){
  Array.from(row.children).forEach(b=>{
    b.disabled = true;
    if(b.textContent === correct) b.classList.add('correct');
    else if(b.textContent === chosen) b.classList.add('wrong');
  });
}

/* 下一题 / 结束 */
function nextQuestion(){
  state.i++;
  if(state.i >= state.questions.length){
    endGame();
  }else{
    renderQuestion();
  }
}

/* —— 结束一局 —— */
function endGame(){
  clearInterval(state.timer);
  // 非重练模式才更新最高分（重练题量少，不计入）
  if(!state.isRetry) setHigh(state.key, state.score);
  // 嵌入积分系统时：提交得分（计入"互动"）+ 错题（写入日志）
  submitResultToParent();
  showResult();
}

/* —— 结果页 —— */
function showResult(){
  const total = state.questions.length;
  const correct = state.correct;
  const acc = total ? Math.round(correct / total * 100) : 0;

  // 星级
  let stars, rank;
  if(acc >= 90){ stars = '⭐⭐⭐'; rank = 'Grammar Master 语法大师'; }
  else if(acc >= 70){ stars = '⭐⭐'; rank = 'Keep practising 继续加油'; }

  const typeCount = {};
  state.wrong.forEach(w=>{ if(w.type) typeCount[w.type] = (typeCount[w.type]||0)+1; });
  const sortedTypes = Object.keys(typeCount).sort((a,b)=>typeCount[b]-typeCount[a]);

  let html = '';
  html += '<div class="result-head">';
  html += '<div class="stars">' + stars + '</div>';
  html += '<div class="rank">' + rank + '</div>';

  html += '<div class="stat"><div class="n">' + state.score + '</div><div class="l">本关得分</div></div>';
  html += '<div class="stat"><div class="n">' + correct + ' / ' + total + '</div><div class="l">正确题数</div></div>';
  html += '<div class="stat"><div class="n">' + acc + '%</div><div class="l">正确率</div></div>';
  if(!state.isRetry) html += '<div class="stat"><div class="n">🏆 ' + getHigh(state.key) + '</div><div class="l">历史最高分</div></div>';

  html += '<div class="section-title">📝 错题回顾</div>';
  if(state.wrong.length === 0){

  }else{
    html += '<div class="wrong-list">';
    state.wrong.forEach(w=>{
      html += '<div class="wrong-item">';
      html += '<div class="q">题目：' + esc(w.prompt) + '</div>';
      html += '<div class="row">你的选择：<span class="your">' + esc(w.your) + '</span></div>';
      html += '<div class="row">正确答案：<span class="cor">' + esc(w.correct) + '</span></div>';
      html += '<div class="exp">💡 ' + esc(w.explain) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // 复习建议
  if(sortedTypes.length > 0){
    html += '<div class="section-title">📚 建议复习点</div>';
    html += '<div class="suggest-box">根据这次的错题，老师建议重点复习：<ul>';
    sortedTypes.forEach(t=>{
      const tip = TYPE_SUGGEST[t] || t;
      html += '<li>' + esc(tip) + '（错 ' + typeCount[t] + ' 题）</li>';
    });
    html += '</ul></div>';
  }

  // 家长反馈文案
  html += '<div class="section-title">👨‍👩‍👧 家长反馈</div>';
  html += '<div class="parent-box">';
  html += '<span id="parentText">' + esc(buildParentText(acc, sortedTypes, typeCount)) + '</span>';
  html += '<div class="parent-actions"><button class="btn btn-ghost copy-btn" id="copyBtn">📋 复制</button></div>';
  html += '</div>';

  // 操作按钮
  html += '<div class="result-actions">';
  html += '<button class="btn btn-mint big" onclick="startGame(\\'' + state.key + '\\')">🔁 再玩一次</button>';
  if(state.wrong.length > 0){
    html += '<button class="btn btn-yellow big" id="retryWrongBtn">🎯 只练错题</button>';
  }
  // 句子拼装站的两个挑战：额外提供“回到句子拼装站”按钮
  if(state.key === 'build_pos' || state.key === 'build_q'){

    const rk = state.key;

  }
  // 复制家长反馈
  const cb = document.getElementById('copyBtn');
  if(cb){
    cb.onclick = ()=>{
      const txt = document.getElementById('parentText').textContent;
      try{
        if(navigator.clipboard && navigator.clipboard.writeText){

        }else{ throw new Error('no clipboard'); }
      }catch(e){
        // 兜底：选中文本
        const range = document.createRange();
        range.selectNodeContents(document.getElementById('parentText'));
        const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
        cb.textContent = '已选中，请手动复制';
      }
    };
  }
}

/* 生成家长反馈文案 */
function buildParentText(acc, sortedTypes, typeCount){
  const gameName = state.cfg.title.replace(/^[^\\u4e00-\\u9fa5A-Za-z]+/, '');
  let txt = '今天孩子完成了《现在进行时闯关》的“' + gameName + '”训练，本次得分 ' + state.score + ' 分，正确率 ' + acc + '%。';
  if(sortedTypes.length === 0){
    txt += '本次表现非常棒，几乎没有错误，可以尝试更有挑战的练习。';
  }else{
    const top = sortedTypes[0];
    txt += '错题主要集中在“' + top + '”，' ;
    const tip = TYPE_SUGGEST[top] || '';
    txt += '建议课后继续复习：' + tip;

            for (let day = 1; day <= days; day++) {
                const date = attendanceDateStr(attendanceState.currentYear, attendanceState.currentMonth, day);
                const schedules = attendanceState.schedules.filter(s => s.date === date).sort((a,b) => a.startTime.localeCompare(b.startTime));
                const cell = document.createElement('div');
                cell.className = 'attendance-day' + (date === today ? ' today' : '');
                cell.onclick = () => attendanceOpenScheduleDialog(date);
                cell.innerHTML = `
                    <div class="attendance-day-head">
                        <span class="attendance-day-num">${day}</span>
                        ${schedules.length ? `<span class="attendance-day-count">${schedules.length}节</span>` : ''}

                    </div>
                `;
                grid.appendChild(cell);
            }
        }
        function attendanceScheduleCardHTML(schedule) {
            const cls = attendanceGetClass(schedule.classId);
            if (!cls) return '';
            const count = attendanceCount(schedule.id);
            const total = cls.students.length;
            return `
                <div class="attendance-card" style="background:${cls.color}" onclick="attendanceOpenScheduleMenu(event,'${attendanceEscape(schedule.id)}')">
                    <div class="attendance-card-name">${attendanceEscape(cls.name)}</div>
                    <div class="attendance-card-meta">${attendanceEscape(schedule.startTime)}-${attendanceEscape(schedule.endTime)}</div>
                    ${count ? `<div class="attendance-card-meta">已签到 ${count}/${total}</div>` : ''}
                </div>
            `;
        }
        function attendanceChangeMonth(delta) {
            attendanceState.currentMonth += delta;
            if (attendanceState.currentMonth > 11) { attendanceState.currentMonth = 0; attendanceState.currentYear++; }
            if (attendanceState.currentMonth < 0) { attendanceState.currentMonth = 11; attendanceState.currentYear--; }
            attendanceClosePopover();
            attendanceRenderCalendar();
        }
        function attendanceGoToday() {
            const d = new Date();
            attendanceState.currentYear = d.getFullYear();
            attendanceState.currentMonth = d.getMonth();
            attendanceClosePopover();
            attendanceRenderCalendar();
        }
        function attendanceOpenScheduleDialog(dateStr, scheduleId='') {
            const schedule = scheduleId ? attendanceState.schedules.find(s => s.id === scheduleId) : null;
            attendanceState.selectedDate = dateStr || schedule?.date || attendanceTodayStr();
            document.getElementById('attendance-schedule-title').textContent = schedule ? '编辑课程' : '添加课程';
            document.getElementById('attendance-schedule-date').textContent = attendanceDisplayDate(attendanceState.selectedDate);
            document.getElementById('attendance-edit-schedule-id').value = schedule ? schedule.id : '';
            document.getElementById('attendance-schedule-start').value = schedule ? schedule.startTime : '18:00';
            document.getElementById('attendance-schedule-end').value = schedule ? schedule.endTime : '19:30';
            attendanceFillClassSelect('attendance-schedule-class', schedule?.classId || currentClassId);
            document.getElementById('attendance-delete-schedule-btn').style.display = schedule ? 'inline-block' : 'none';
            attendanceOpenDialog('attendance-schedule-dialog');
        }
        function attendanceFillClassSelect(selectId, selectedId) {
            const select = document.getElementById(selectId);
            const classes = attendanceGetClasses();
            if (!classes.length) {
                select.innerHTML = '<option value="">请先在主界面添加班级</option>';
                return;
            }
            select.innerHTML = classes.map(c => `<option value="${attendanceEscape(c.id)}" ${c.id === selectedId ? 'selected' : ''}>${attendanceEscape(c.name)} (${c.students.length}人)</option>`).join('');
        }
        function attendanceSaveSchedule() {
            const id = document.getElementById('attendance-edit-schedule-id').value;
            const classId = document.getElementById('attendance-schedule-class').value;
            const startTime = document.getElementById('attendance-schedule-start').value;
            const endTime = document.getElementById('attendance-schedule-end').value;
            if (!classId) { alert('请先选择班级'); return; }
            if (!startTime || !endTime) { alert('请填写上课时间'); return; }
            if (id) {
                const schedule = attendanceState.schedules.find(s => s.id === id);
                if (schedule) Object.assign(schedule, { classId, startTime, endTime });
            } else {
                attendanceState.schedules.push({ id: attendanceGenerateId(), date: attendanceState.selectedDate, classId, startTime, endTime });
            }
            attendanceSaveData();
            attendanceCloseDialog('attendance-schedule-dialog');
            attendanceRenderAll();
        }
        function attendanceDeleteEditingSchedule() {
            const id = document.getElementById('attendance-edit-schedule-id').value;
            if (id) attendanceDeleteScheduleById(id);
            attendanceCloseDialog('attendance-schedule-dialog');
        }
        function attendanceDeleteScheduleById(scheduleId) {
            const schedule = attendanceState.schedules.find(s => s.id === scheduleId);
            if (!schedule) return;
            const cls = attendanceGetClass(schedule.classId);
            if (!confirm(`确定删除 ${attendanceDisplayDate(schedule.date)} 的 ${cls ? cls.name : '课程'} 吗？\n对应签到记录也会删除。`)) return;
            attendanceState.schedules = attendanceState.schedules.filter(s => s.id !== scheduleId);
            attendanceState.attendance = attendanceState.attendance.filter(a => a.scheduleId !== scheduleId);
            attendanceSaveData();
            attendanceClosePopover();
            attendanceRenderAll();
        }
        function attendanceOpenScheduleMenu(ev, scheduleId) {
            ev.stopPropagation();
            const schedule = attendanceState.schedules.find(s => s.id === scheduleId);
            const cls = schedule && attendanceGetClass(schedule.classId);
            if (!schedule || !cls) return;
            attendanceClosePopover();
            const pop = document.createElement('div');
            pop.className = 'attendance-popover';
            pop.id = 'attendance-popover';
            pop.innerHTML = attendancePopoverHTML(schedule, cls);
            document.body.appendChild(pop);
            const rect = ev.currentTarget.getBoundingClientRect();
            const maxLeft = window.innerWidth - pop.offsetWidth - 18;
            const maxTop = window.innerHeight - pop.offsetHeight - 18;
            pop.style.left = Math.max(18, Math.min(rect.left, maxLeft)) + 'px';
            pop.style.top = Math.max(18, Math.min(rect.bottom + 8, maxTop)) + 'px';
            setTimeout(() => document.addEventListener('mousedown', attendanceOutsidePopover), 0);
        }
        function attendancePopoverHTML(schedule, cls) {
            return `
                <div class="attendance-pop-head">
                    <div>
                        <div class="attendance-pop-title">${attendanceEscape(cls.name)}</div>
                        <div style="font-size:12px;color:var(--text-light);margin-top:2px;">${attendanceDisplayDate(schedule.date)} ${schedule.startTime}-${schedule.endTime}</div>
                    </div>
                    <button class="attendance-icon-btn" onclick="attendanceClosePopover()">×</button>
                </div>
                <div>
                    ${cls.students.length ? cls.students.map(s => attendanceStudentLineHTML(schedule.id, s)).join('') : '<div class="attendance-empty">该班暂无学生</div>'}
                </div>
                <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
                    <button class="attendance-primary" onclick="attendanceOpenRollCall('${attendanceEscape(schedule.id)}')">签到面板</button>
                    <button class="attendance-secondary" onclick="attendanceOpenScheduleDialog('${attendanceEscape(schedule.date)}','${attendanceEscape(schedule.id)}');attendanceClosePopover();">编辑</button>
                    <button class="attendance-danger" onclick="attendanceDeleteScheduleById('${attendanceEscape(schedule.id)}')">删除</button>
                </div>
            `;
        }
        function attendanceStudentLineHTML(scheduleId, student) {
            const record = attendanceState.attendance.find(a => a.scheduleId === scheduleId && a.studentId === student.id);
            const status = record ? attendanceStatusText(record.status) : '未签到';
            return `
                <div class="attendance-student-line">
                    <div style="min-width:0;">
                        <div style="font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${attendanceEscape(student.avatar ? student.avatar + ' ' : '')}${attendanceEscape(student.name)}</div>
                        <div style="font-size:12px;color:var(--text-light);">${status}</div>
                    </div>
                    <div class="attendance-status-actions">
                        <button class="attendance-mini-btn present" onclick="attendanceQuickMark('${attendanceEscape(scheduleId)}','${attendanceEscape(student.id)}','P')">到</button>
                        <button class="attendance-mini-btn late" onclick="attendanceQuickMark('${attendanceEscape(scheduleId)}','${attendanceEscape(student.id)}','L')">迟</button>
                        <button class="attendance-mini-btn absent" onclick="attendanceQuickMark('${attendanceEscape(scheduleId)}','${attendanceEscape(student.id)}','A')">假</button>
                    </div>
                </div>
            `;
        }
        function attendanceOutsidePopover(e) {
            const pop = document.getElementById('attendance-popover');
            if (pop && !pop.contains(e.target) && !e.target.closest('.attendance-card')) attendanceClosePopover();
        }
        function attendanceClosePopover() {
            document.removeEventListener('mousedown', attendanceOutsidePopover);
            document.getElementById('attendance-popover')?.remove();
        }
        function attendanceOpenRollCall(scheduleId) {
            const schedule = attendanceState.schedules.find(s => s.id === scheduleId);
            const cls = schedule && attendanceGetClass(schedule.classId);
            if (!schedule || !cls) return;
            attendanceState.selectedScheduleId = scheduleId;
            document.getElementById('attendance-roll-title').textContent = `${cls.name} 签到`;
            document.getElementById('attendance-roll-meta').textContent = `${attendanceDisplayDate(schedule.date)} ${schedule.startTime}-${schedule.endTime}`;
            attendanceRenderRollList();
            attendanceClosePopover();
            attendanceOpenDialog('attendance-roll-dialog');
        }
        function attendanceRenderRollList() {
            const list = document.getElementById('attendance-roll-list');
            const schedule = attendanceState.schedules.find(s => s.id === attendanceState.selectedScheduleId);
            const cls = schedule && attendanceGetClass(schedule.classId);
            if (!list || !schedule || !cls) return;
            if (!cls.students.length) {
                list.innerHTML = '<div class="attendance-empty">该班暂无学生</div>';
                return;
            }
            list.innerHTML = cls.students.map(s => {
                const record = attendanceState.attendance.find(a => a.scheduleId === schedule.id && a.studentId === s.id);
                return `
                    <div class="attendance-roll-row">
                        <div>
                            <div class="attendance-roll-name">${attendanceEscape(s.avatar ? s.avatar + ' ' : '')}${attendanceEscape(s.name)}</div>
                            <div class="attendance-roll-status">${record ? attendanceStatusText(record.status) : '未签到'}</div>
                        </div>
                        <div class="attendance-status-actions">
                            <button class="attendance-mini-btn present" onclick="attendanceQuickMark('${attendanceEscape(schedule.id)}','${attendanceEscape(s.id)}','P')">出勤</button>
                            <button class="attendance-mini-btn late" onclick="attendanceQuickMark('${attendanceEscape(schedule.id)}','${attendanceEscape(s.id)}','L')">迟到</button>
                            <button class="attendance-mini-btn absent" onclick="attendanceQuickMark('${attendanceEscape(schedule.id)}','${attendanceEscape(s.id)}','A')">请假</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        function attendanceQuickMark(scheduleId, studentId, status) {
            const schedule = attendanceState.schedules.find(s => s.id === scheduleId);
            if (!schedule) return;
            attendanceState.attendance = attendanceState.attendance.filter(a => !(a.scheduleId === scheduleId && a.studentId === studentId));
            attendanceState.attendance.push({ id: attendanceGenerateId(), scheduleId, studentId, status, date: schedule.date });
            attendanceSaveData();
            attendanceRenderCalendar();
            attendanceRenderRollList();
            const pop = document.getElementById('attendance-popover');
            if (pop) {
                const cls = attendanceGetClass(schedule.classId);
                pop.innerHTML = attendancePopoverHTML(schedule, cls);
            }
        }
        function attendanceMarkAllPresent() {
            const schedule = attendanceState.schedules.find(s => s.id === attendanceState.selectedScheduleId);
            const cls = schedule && attendanceGetClass(schedule.classId);
            if (!schedule || !cls) return;
            if (!confirm(`确定将「${cls.name}」全班 ${cls.students.length} 名学生标记为出勤吗？`)) return;
            cls.students.forEach(s => {
                attendanceState.attendance = attendanceState.attendance.filter(a => !(a.scheduleId === schedule.id && a.studentId === s.id));
                attendanceState.attendance.push({ id: attendanceGenerateId(), scheduleId: schedule.id, studentId: s.id, status: 'P', date: schedule.date });
            });
            attendanceSaveData();
            attendanceRenderCalendar();
            attendanceRenderRollList();
        }
        function attendanceStatusText(status) {

        function attendanceCount(scheduleId) {
            return attendanceState.attendance.filter(a => a.scheduleId === scheduleId).length;

        function attendanceOpenCopyDialog() {
            const source = document.getElementById('attendance-copy-source');
            const dates = [...new Set(attendanceState.schedules.map(s => s.date))].sort();
            if (!dates.length) {
                alert('暂无课程可复制');
                return;

            source.innerHTML = dates.map(d => `<option value="${d}">${attendanceDisplayDate(d)}（${attendanceState.schedules.filter(s => s.date === d).length}节）</option>`).join('');

        function attendanceRenderCopyCourses() {
            const sourceDate = document.getElementById('attendance-copy-source').value;
            const box = document.getElementById('attendance-copy-course-list');
            const schedules = attendanceState.schedules.filter(s => s.date === sourceDate);
            box.innerHTML = schedules.map(s => {
                const cls = attendanceGetClass(s.classId);
                if (!cls) return '';
                return `
                    <label class="attendance-roll-row" style="cursor:pointer;">
                        <div>
                            <div class="attendance-roll-name">${attendanceEscape(cls.name)}</div>
                            <div class="attendance-roll-status">${attendanceEscape(s.startTime)}-${attendanceEscape(s.endTime)}</div>
                        </div>
                        <input type="checkbox" class="attendance-copy-course" value="${attendanceEscape(s.id)}" checked>
                    </label>
                `;
            }).join('');
        }
        function attendanceCopyCourses() {
            const target = document.getElementById('attendance-copy-target').value;
            if (!target) { alert('请选择目标日期'); return; }
            const selected = [...document.querySelectorAll('.attendance-copy-course:checked')].map(i => i.value);
            if (!selected.length) { alert('请至少选择一节课程'); return; }
            let copied = 0, skipped = 0;
            selected.forEach(id => {
                const src = attendanceState.schedules.find(s => s.id === id);
                if (!src) return;
                const exists = attendanceState.schedules.some(s => s.date === target && s.classId === src.classId && s.startTime === src.startTime && s.endTime === src.endTime);
                if (exists) { skipped++; return; }
                attendanceState.schedules.push({ id: attendanceGenerateId(), date: target, classId: src.classId, startTime: src.startTime, endTime: src.endTime });
                copied++;
            });
            attendanceSaveData();
            attendanceCloseDialog('attendance-copy-dialog');
            attendanceRenderCalendar();
            alert(`已复制 ${copied} 节课程${skipped ? `，跳过 ${skipped} 节重复课程` : ''}`);
        }
        function attendanceExportCSV() {
            if (!attendanceState.attendance.length) {
                alert('暂无签到记录可导出');
                return;
            }
            let csv = '\uFEFF日期,班级,学生,状态,时间段\n';
            attendanceState.attendance.forEach(a => {
                const schedule = attendanceState.schedules.find(s => s.id === a.scheduleId);
                const cls = schedule && attendanceGetClass(schedule.classId);
                const student = cls && cls.students.find(s => s.id === a.studentId);
                if (schedule && cls && student) {
                    csv += `${a.date},${cls.name},${student.name},${attendanceStatusText(a.status)},${schedule.startTime}-${schedule.endTime}\n`;
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `签到记录_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            setTimeout(() => URL.revokeObjectURL(link.href), 1000);
        }
        function attendanceOpenDialog(id) {
            document.getElementById(id)?.classList.add('show');
        }
        function attendanceCloseDialog(id) {
            document.getElementById(id)?.classList.remove('show');
        }
        document.addEventListener('click', (e) => {
            if (e.target && e.target.id === 'attendance-modal-container') closeScheduleAttendance();
            if (e.target && e.target.classList && e.target.classList.contains('attendance-dialog')) attendanceCloseDialog(e.target.id);
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('attendance-modal-container')?.classList.contains('show')) closeScheduleAttendance();
        });

on><button class="btn btn-pause" id="btnPause" disabled>⏸ 暂停</button><button class="btn btn-reset" id="btnReset">↺ 重置</button></div><div class="error-msg" id="errorMsg"></div></div><div class="times-up-overlay" id="timesUpOverlay"><div class="times-up-text">⏰ Time's Up!</div><div class="times-up-sub">时间到！做得很棒！🎊</div><button class="times-up-close" onclick="closeOverlay()">好的，谢谢！✅</button></div><div id="confettiContainer" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:998;overflow:hidden;"></div><script>let totalSeconds=60,remainSeconds=60,timerId=null,isRunning=false,isPaused=false;const CIRCUMFERENCE=2*Math.PI*80;let audioCtx=null;function getAudioCtx(){if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}function playBeep(freq,duration,delay,type){const ctx=getAudioCtx();const osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.type=type;osc.frequency.value=freq;gain.gain.setValueAtTime(0.6,ctx.currentTime+delay);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+duration);osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+duration+0.05)}function playAlarm(){playBeep(880,0.25,0,'square');playBeep(880,0.25,0.4,'square');playBeep(1100,0.4,0.8,'square')}function playTick(){playBeep(660,0.08,0,'triangle')}function readInput(){const h=parseInt(document.getElementById('inputH').value)||0;const m=parseInt(document.getElementById('inputM').value)||0;const s=parseInt(document.getElementById('inputS').value)||0;return h*3600+m*60+s}function validateInput(){const hv=parseInt(document.getElementById('inputH').value),mv=parseInt(document.getElementById('inputM').value),sv=parseInt(document.getElementById('inputS').value);if(isNaN(hv)||isNaN(mv)||isNaN(sv)){showError('⚠️ 请输入有效数字！');return false}if(hv<0||mv<0||sv<0){showError('⚠️ 时间不能为负数！');return false}if(mv>59||sv>59){showError('⚠️ 分钟和秒数不能超过59！');return false}const total=hv*3600+mv*60+sv;if(total===0){showError('⚠️ 倒计时时间不能为零！');return false}clearError();return total}function formatTime(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return [h,m,s].map(v=>String(v).padStart(2,'0')).join(':')}function updateDisplay(sec){document.getElementById('timeDisplay').textContent=formatTime(sec);const ring=document.getElementById('ringFg');const pct=totalSeconds>0?sec/totalSeconds:0;ring.style.strokeDashoffset=CIRCUMFERENCE*(1-pct);if(sec<=10&&sec>0&&isRunning){document.getElementById('timeDisplay').classList.add('last10');document.body.classList.add('last10');ring.style.stroke='#ff0000'}else{document.getElementById('timeDisplay').classList.remove('last10');document.body.classList.remove('last10');ring.style.stroke='#4ecdc4'}}function startTimer(){if(isRunning) return;if(isPaused){isRunning=true;isPaused=false;setButtonState('running');document.getElementById('statusText').textContent='倒计时中... 加油！💪';tick();return}const total=validateInput();if(!total) return;totalSeconds=total;remainSeconds=total;isRunning=true;isPaused=false;setInputsDisabled(true);setButtonState('running');document.getElementById('statusText').textContent='倒计时中... 加油！💪';updateDisplay(remainSeconds);tick()}function tick(){if(timerId) clearInterval(timerId);timerId=setInterval(()=>{remainSeconds--;updateDisplay(remainSeconds);if(remainSeconds<=10&&remainSeconds>0){playTick();const el=document.getElementById('timeDisplay');el.classList.remove('pulse');void el.offsetWidth;el.classList.add('pulse')}if(remainSeconds<=0){clearInterval(timerId);timerId=null;isRunning=false;onTimeUp()}},1000)}function pauseTimer(){if(!isRunning) return;clearInterval(timerId);timerId=null;isRunning=false;isPaused=true;setButtonState('paused');document.getElementById('statusText').textContent='⏸ 已暂停'}function resetTimer(){clearInterval(timerId);timerId=null;isRunning=false;isPaused=false;remainSeconds=totalSeconds;document.getElementById('timeDisplay').classList.remove('last10');document.body.classList.remove('last10');document.getElementById('ringFg').style.stroke='#4ecdc4';setInputsDisabled(false);setButtonState('idle');updateDisplay(remainSeconds);document.getElementById('statusText').textContent='准备好了！按开始 🎯';clearError()}function setPreset(minutes){if(isRunning) return;clearInterval(timerId);isRunning=false;isPaused=false;document.getElementById('inputH').value=0;document.getElementById('inputM').value=minutes;document.getElementById('inputS').value=0;totalSeconds=minutes*60;remainSeconds=totalSeconds;updateDisplay(remainSeconds);setInputsDisabled(false);setButtonState('idle');document.getElementById('statusText').textContent='已设置 '+minutes+' 分钟，按开始！🚀';clearError()}function onTimeUp(){document.getElementById('timeDisplay').classList.remove('last10');document.body.classList.remove('last10');updateDisplay(0);setButtonState('idle');setInputsDisabled(false);document.getElementById('statusText').textContent="🎉 Time's Up! 太棒了！";playAlarm();setTimeout(showTimesUpOverlay,500);spawnConfetti()}function showTimesUpOverlay(){document.getElementById('timesUpOverlay').classList.add('show')}window.closeOverlay=function(){document.getElementById('timesUpOverlay').classList.remove('show');document.getElementById('confettiContainer').innerHTML=''};function spawnConfetti(){const container=document.getElementById('confettiContainer');container.innerHTML='';const colors=['#ff6b35','#ffe66d','#4ecdc4','#ff8cc8','#a8ff78','#ff6b6b'];const shapes=['●','★','♦','▲','■'];for(let i=0;i<60;i++){const el=document.createElement('div');el.style.cssText='position:absolute;left:'+Math.random()*100+'%;top:-30px;font-size:'+(14+Math.random()*18)+'px;color:'+colors[Math.floor(Math.random()*colors.length)]+';animation:confetti-fall '+(2+Math.random()*3)+'s '+Math.random()*1.5+'s linear forwards;';el.textContent=shapes[Math.floor(Math.random()*shapes.length)];container.appendChild(el)}}function setButtonState(state){const bs=document.getElementById('btnStart'),bp=document.getEl on>\n        <section class=\"setup-card\">\n          <div class=\"topic-selector\" id=\"topicSelector\">\n              <label>📚 选择教材 / 单元 / 主题词汇</label>\n              <select class=\"topic-select\" id=\"topicSelect\" onchange=\"loadTopic()\"></select>\n          </div>\n          <div class=\"round-settings\">\n              <label class=\"round-control\">每轮题数\n                  <select class=\"round-select\" id=\"roundQuestionSelect\" onchange=\"updateRoundHint()\">\n                      <option value=\"10\" selected>10</option>\n                      <option value=\"15\">15</option>\n                      <option value=\"20\">20</option>\n                      <option value=\"all\">全部</option>\n                  </select>\n              </label>\n              <div class=\"round-hint\" id=\"roundHint\">每轮默认 10 题，会优先练习未出现过的词。</div>\n          </div>\n        </section>\n      </aside>\n\n      <main class=\"main-card\" id=\"mainCard\">\n        <div class=\"study-buddy\" aria-hidden=\"true\"><span>🤖</span></div>\n        <div class=\"title-box\" id=\"titleBox\"><span class=\"note-emoji\">🎧</span><h1 class=\"title\">听音选词</h1><span class=\"note-emoji\">✅</span></div>\n        <div class=\"stats\">\n            <div class=\"stat\"><b id=\"questionStat\">0/0</b><span>题目</span></div>\n            <div class=\"stat\"><b id=\"correctStat\">0</b><span>答对</span></div>\n            <div class=\"stat\"><b id=\"wrongStat\">0</b><span>不熟悉</span></div>\n            <div class=\"stat\"><b id=\"rateStat\">0%</b><span>正确率</span></div>\n        </div>\n        <section class=\"game-stage\">\n            <div class=\"audio-card\">\n                <div class=\"headphone\" id=\"playBtn\" onclick=\"playCurrentAudio()\">🎧</div>\n                <div class=\"meaning\" id=\"meaningBox\"></div>\n                <div class=\"phonics\" id=\"phonicsBox\"></div>\n            </div>\n            <div id=\"audioStatus\" style=\"font-size:12px;color:#aaa;font-weight:700;margin:-8px 0 4px;text-align:center;min-height:18px;\"></div>\n            <div class=\"options\" id=\"options\"></div>\n            <div class=\"controls\">\n                <button class=\"game-btn\" id=\"startBtn\" onclick=\"startGame()\">开始游戏</button>\n                <button class=\"game-btn secondary\" onclick=\"playCurrentAudio()\">重听</button>\n                <button class=\"game-btn secondary\" onclick=\"resetGame()\">重置</button>\n            </div>\n        </section>\n        <div class=\"modal\" id=\"resultModal\">\n            <div class=\"modal-content\" id=\"resultPanel\">\n                <h2>🎉 游戏结束</h2>\n                <p id=\"resultSummary\"></p>\n                <p class=\"wrong-list\" id=\"resultWrong\"></p>\n                <button class=\"close-btn\" onclick=\"closeResult()\">关闭</button>\n            </div>\n        </div>\n      </main>\n    </div>\n\n    <div class=\"teacher-modal\" id=\"teacherModal\" onclick=\"handleTeacherOverlayClick(event)\">\n        <div class=\"teacher-panel\">\n            <span class=\"panel-close\" onclick=\"closeTeacher()\">✕</span>\n            <div class=\"panel-title\">🏫 教师端 — 词汇导入</div>\n            <div class=\"panel-subtitle\">支持导入教材单元主题词汇表（Excel 格式，含自然拼读划分）</div>\n            <div class=\"steps\">\n                <div class=\"step\">\n                    <div class=\"step-header\"><div class=\"step-num\">1</div><div class=\"step-title\">下载示例模板</div></div>\n                    <div class=\"step-desc\">模板包含六列：<br><b>当前教材</b>、<b>单元</b>、<b>主题</b>、<b>单词</b>、<b>自然拼读划分</b>、<b>中文</b></div>\n                    <table class=\"format-table\">\n                        <thead><tr><th>A列：当前教材</th><th>B列：单元</th><th>C列：主题</th><th>D列：单词</th><th>E列：自然拼读划分</th><th>F列：中文</th></tr></thead>\n                        <tbody>\n                            <tr><td>KET Starter</td><td>Unit 1</td><td>Animals</td><td>cat</td><td>c a t</td><td>猫</td></tr>\n                            <tr><td>KET Starter</td><td>Unit 1</td><td>Animals</td><td>dog</td><td>d o g</td><td>狗</td></tr>\n                            <tr><td>KET Starter</td><td>Unit 1</td><td>Numbers</td><td>nine</td><td>n i ne</td><td>九</td></tr>\n                        </tbody>\n                    </table>\n                    <button class=\"dl-btn\" onclick=\"downloadTemplate()\">⬇️ 下载示例模板（Excel）</button>\n                </div>\n                <div class=\"step\">\n                    <div class=\"step-header\"><div class=\"step-num\">2</div><div class=\"step-title\">导入 Excel 词汇表</div></div>\n                    <div class=\"step-desc\">同一单元可填写不同主题；每个主题至少 4 个不同单词才能开始听音选词。</div>\n                    <div class=\"upload-zone\" id=\"uploadZone\">\n                        <input type=\"file\" id=\"excelFile\" accept=\".xlsx,.xls\" onchange=\"handleFileUpload(event)\">\n                        <div class=\"upload-icon\">📂</div>\n                        <div class=\"upload-text\">点击选择文件，或将 Excel 拖放至此处<br><strong>支持 .xlsx / .xls 格式</strong></div>\n                    </div>\n                    <div class=\"import-result\" id=\"importResult\"></div>\n                </div>\n            </div>\n            <div class=\"panel-footer\">\n                <button class=\"panel-btn cancel\" onclick=\"closeTeacher()\">取消</button>\n                <button class=\"panel-btn confirm\" id=\"confirmImport\" disabled onclick=\"confirmImport()\">✅ 应用词汇</button>\n            </div>\n        </div>\n    </div>\n\n    <script>\n        const STORAGE_KEY = \"listen_choice_vocab_v1\";\n        const MIN_OPTIONS = 4;\n        const MAX_QUESTIONS = 10;\n        let currentTheme = \"#FFA6D8\";\n        let importedTopics = {};\n        let pendingTopics = {};\n        let wordList = [];\n        let questionQueue = [];\n        let currentWord = null;\n        let currentOptions = [];\n        let currentIndex = 0;\n        let totalQuestions = 0;\n        let correctCount = 0;\n        let wrongWords = [];\n        let answered = false;\n        let currentTopicKey = \"\";\n        let topicRoundPools = {};\n        let lastRoundByTopic = {};\n        let feedbackAudioCtx = null;\n        let selectedStudentId = \"\";\n        let selectedStudentName = \"\";\n        let integratedMode = false;\n        let listenChoiceBridgeLoaded = false;\n        let listenChoiceBridgeData = { classes: [], currentClassId: \"\", students: [], vocabulary: null };\n        const wordAudioCache = new Map();\n        let activeWordAudio = null;\n        let audioPlaybackToken = 0;\n        let audioPreloadToken = 0;\n\n        const sampleTopics = {\n            \"示例教材｜Unit 1｜Animals\": [\n                {book:\"示例教材\",unit:\"Unit 1\",theme:\"Animals\",en:\"cat\",phonics:\"c a t\",chunks:[\"c\",\"a\",\"t\"],cn:\"猫\"},\n                {book:\"示例教材\",unit:\"Unit 1\",theme:\"Animals\",en:\"dog\",phonics:\"d o g\",chunks:[\"d\",\"o\",\"g\"],cn:\"狗\"},\n                {book:\"示例教材\",unit:\"Unit 1\",theme:\"Animals\",en:\"bird\",phonics:\"b ir d\",chunks:[\"b\",\"ir\",\"d\"],cn:\"鸟\"},\n                {book:\"示例教材\",unit:\"Unit 1\",theme:\"Animals\",en:\"fish\",phonics:\"f i sh\",chunks:[\"f\",\"i\",\"sh\"],cn:\"鱼\"},\n                {book:\"示例教材\",unit:\"Unit 1\",theme:\"Animals\",en:\"rabbit\",phonics:\"r a bb i t\",chunks:[\"r\",\"a\",\"bb\",\"i\",\"t\"],cn:\"兔子\"},\n                {book:\"示例教材\",unit:\"Unit 1\",theme:\"Animals\",en:\"horse\",phonics:\"h or se\",chunks:[\"h\",\"or\",\"se\"],cn:\"马\"}\n            ]\n        };\n\n        function showToast(msg){\n            const t = document.getElementById(\"toast\");\n            t.textContent = msg;\n            t.style.display = \"block\";\n            t.style.opacity = 1;\n            clearTimeout(t._timer);\n            t._timer = setTimeout(function(){\n                t.style.opacity = 0;\n                setTimeout(function(){ t.style.display = \"none\"; }, 300);\n            }, 2400);\n        }\n\n        function escapeHtml(value){\n            return String(value == null ? \"\" : value)\n                .replace(/&/g, \"&amp;\")\n                .replace(/</g, \"&lt;\")\n                .replace(/>/g, \"&gt;\")\n                .replace(/\"/g, \"&quot;\")\n                .replace(/'/g, \"&#39;\");\n        }\n\n        function getListenChoiceAPI(){\n            try {\n                if (window.parent && window.parent !== window) {\n                    const directAPI = window.parent.listenChoiceAPI || window.parent.dictationAPI;\n                    if (directAPI) {\n                        listenChoiceBridgeLoaded = true;\n                        return directAPI;\n                    }\n                }\n            } catch(e) {}\n            try {\n                if (window.parent && window.parent !== window) {\n                    return {\n                        getClasses: () => listenChoiceBridgeData.classes || [],\n                        getCurrentClassId: () => listenChoiceBridgeData.currentClassId || \"\",\n                        getStudents: () => listenChoiceBridgeData.students || [],\n                        getVocabulary: () => listenChoiceBridgeData.vocabulary,\n                        saveVocabulary: (data) => {\n                            listenChoiceBridgeData.vocabulary = data;\n                            window.parent.postMessage({ type: \"listenchoice:saveVocabulary\", vocabulary: data }, \"*\");\n                            return true;\n                        },\n                        addListenChoiceScore: (studentId, score) => {\n                            window.parent.postMessage({ type: \"listenchoice:addScore\", studentId, score }, \"*\");\n                            return true;\n                        },\n                        addDictationScore: (studentId, score) => {\n                            window.parent.postMessage({ type: \"listenchoice:addScore\", studentId, score }, \"*\");\n                            return true;\n                        },\n                        addListenChoiceUnfamiliarWords: (studentId, words) => {\n                            window.parent.postMessage({ type: \"listenchoice:addUnfamiliarWords\", studentId, words }, \"*\");\n                            return true;\n                        },\n                        addDictationUnfamiliarWords: (studentId, words) => {\n                            window.parent.postMessage({ type: \"listenchoice:addUnfamiliarWords\", studentId, words }, \"*\");\n                            return true;\n                        }\n                    };\n                }\n            } catch(e) {}\n            return null;\n        }\n\n        function requestListenChoiceBridgeData(){\n            try {\n                if (window.parent && window.parent !== window) {\n                    window.parent.postMessage({ type: \"listenchoice:requestData\" }, \"*\");\n                }\n            } catch(e) {}\n        }\n\n        function refreshIntegratedStudents(){\n            const api = getListenChoiceAPI();\n            const panel = document.getElementById(\"studentPanel\");\n            if (!api) {\n                integratedMode = false;\n                document.body.classList.remove(\"integrated-mode\");\n                if (panel) panel.classList.remove(\"show\");\n                return;\n            }\n            integratedMode = true;\n            document.body.classList.add(\"integrated-mode\");\n            if (panel) panel.classList.add(\"show\");\n\n            const classes = api.getClasses ? api.getClasses() : [];\n            const currentId = api.getCurrentClassId ? api.getCurrentClassId() : \"\";\n            const currentClass = classes.find(c => c.id === currentId);\n            document.getElementById(\"studentClassName\").textContent = currentClass ? currentClass.name : \"当前班级\";\n\n            const list = document.getElementById(\"studentList\");\n            const students = api.getStudents ? api.getStudents() : [];\n            list.innerHTML = \"\";\n            if (!listenChoiceBridgeLoaded && !(students && students.length)) {\n                list.innerHTML = '<div style=\"color:#888;font-weight:800;\">正在读取当前班级学生名单...</div>';\n                document.getElementById(\"studentHint\").innerHTML = \"如果长时间没有显示学生，请关闭后重新打开“听音选词”。\";\n                requestListenChoiceBridgeData();\n                return;\n            }\n            if (!students.length) {\n                selectedStudentId = \"\";\n                selectedStudentName = \"\";\n                list.innerHTML = '<div style=\"color:#888;font-weight:800;\">当前班级暂无学生，请先在主界面添加学生。</div>';\n                document.getElementById(\"studentHint\").innerHTML = \"添加学生后，点击姓名即可开始作答。\";\n                return;\n            }\n            if (selectedStudentId && !students.some(s => s.id === selectedStudentId)) {\n                selectedStudentId = \"\";\n                selectedStudentName = \"\";\n            }\n            students.forEach(student => {\n                const btn = document.createElement(\"button\");\n                btn.type = \"button\";\n                btn.className = \"student-choice-btn\" + (student.id === selectedStudentId ? \" active\" : \"\");\n                btn.textContent = (student.avatar ? student.avatar + \" \" : \"\") + student.name;\n                btn.onclick = function(){\n                    selectStudentAndStart(student);\n                };\n                list.appendChild(btn);\n            });\n            updateStudentHint();\n        }\n\n        function updateStudentHint(){\n            const hint = document.getElementById(\"studentHint\");\n            if (!hint) return;\n            if (selectedStudentId) {\n                hint.innerHTML = \"已选中：<b>\" + escapeHtml(selectedStudentName) + \"</b>；点击姓名或“开始游戏”可重新开始本轮。每答对 1 个单词 +10 分。\";\n            } else {\n                hint.innerHTML = \"点击自己的名字即可开始作答；每答对 1 个单词 +10 分。\";\n            }\n        }\n\n        function selectStudentAndStart(student){\n            selectedStudentId = student.id;\n            selectedStudentName = student.name || \"\";\n            refreshIntegratedStudents();\n            if (!currentTopicKey) {\n                showToast(\"请先选择教材 / 单元 / 主题\");\n                return;\n            }\n            startGame();\n        }\n\n        function getFeedbackAudioContext(){\n            const AudioContextClass = window.AudioContext || window.webkitAudioContext;\n            if (!AudioContextClass) return null;\n            if (!feedbackAudioCtx) feedbackAudioCtx = new AudioContextClass();\n            return feedbackAudioCtx;\n        }\n\n        function scheduleFeedbackTone(ctx, notes, type){\n            const start = ctx.currentTime + 0.01;\n            notes.forEach(function(note, index){\n                const osc = ctx.createOscillator();\n                const gain = ctx.createGain();\n                const t0 = start + index * 0.1;\n                const t1 = t0 + note.duration;\n                osc.type = type;\n                osc.frequency.setValueAtTime(note.freq, t0);\n                gain.gain.setValueAtTime(0.0001, t0);\n                gain.gain.exponentialRampToValueAtTime(note.volume || 0.12, t0 + 0.015);\n                gain.gain.exponentialRampToValueAtTime(0.0001, t1);\n                osc.connect(gain);\n                gain.connect(ctx.destination);\n                osc.start(t0);\n                osc.stop(t1 + 0.02);\n            });\n        }\n\n        function playFeedbackSound(isCorrect){\n            try {\n                const ctx = getFeedbackAudioContext();\n                if (!ctx) return;\n                const notes = isCorrect\n                    ? [{freq:660, duration:0.08, volume:0.24}, {freq:880, duration:0.11, volume:0.26}]\n                    : [{freq:220, duration:0.12, volume:0.21}, {freq:165, duration:0.16, volume:0.23}];\n                const type = isCorrect ? \"sine\" : \"sawtooth\";\n                if (ctx.state === \"suspended\") {\n                    ctx.resume().then(function(){ scheduleFeedbackTone(ctx, notes, type); });\n                } else {\n                    scheduleFeedbackTone(ctx, notes, type);\n                }\n            } catch(e) {}\n        }\n\n        function setTheme(theme){\n            const map = {pink:\"#FFA6D8\", blue:\"#A6D8FF\", purple:\"#D4B3FF\", green:\"#A3E8A8\"};\n            const softMap = {pink:\"#FFF0F8\", blue:\"#EEF8FF\", purple:\"#F6F0FF\", green:\"#F1FFF3\"};\n            const washMap = {pink:\"#FFF8FD\", blue:\"#F3FBFF\", purple:\"#FAF6FF\", green:\"#F7FFF8\"};\n            currentTheme = map[theme] || map.pink;\n            document.documentElement.style.setProperty(\"--theme\", currentTheme);\n            document.documentElement.style.setProperty(\"--theme-soft\", softMap[theme] || softMap.pink);\n            document.documentElement.style.setProperty(\"--theme-wash\", washMap[theme] || washMap.pink);\n            document.getElementById(\"mainCard\").style.borderColor = currentTheme;\n            document.getElementById(\"titleBox\").style.borderColor = currentTheme;\n            document.getElementById(\"teacherBtn\").style.borderColor = currentTheme;\n            document.getElementById(\"resultPanel\").style.borderColor = currentTheme;\n            document.querySelector(\".close-btn\").style.background = currentTheme;\n            document.querySelectorAll(\".game-btn:not(.secondary)\").forEach(btn => btn.style.background = currentTheme);\n            document.querySelectorAll(\".game-btn.secondary\").forEach(btn => btn.style.borderColor = currentTheme);\n            document.querySelectorAll(\".option-btn\").forEach(btn => {\n                if (btn.classList.contains(\"correct\")) btn.style.borderColor = \"#67c587\";\n                else if (btn.classList.contains(\"wrong\")) btn.style.borderColor = \"#ff7676\";\n                else btn.style.borderColor = currentTheme;\n            });\n            const studentPanel = document.getElementById(\"studentPanel\");\n            if (studentPanel) studentPanel.style.borderColor = currentTheme;\n            document.querySelectorAll(\".student-choice-btn.active\").forEach(btn => btn.style.borderColor = currentTheme);\n            document.querySelectorAll(\".step-num\").forEach(n => n.style.background = currentTheme);\n            document.querySelectorAll(\".dl-btn\").forEach(btn => btn.style.borderColor = currentTheme);\n            const upload = document.getElementById(\"uploadZone\");\n            if (upload) upload.style.borderColor = currentTheme;\n            document.getElementById(\"confirmImport\").style.background = currentTheme;\n        }\n\n        function shuffle(arr){\n            const a = arr.slice();\n            for (let i = a.length - 1; i > 0; i--) {\n                const j = Math.floor(Math.random() * (i + 1));\n                [a[i], a[j]] = [a[j], a[i]];\n            }\n            return a;\n        }\n\n        function splitPhonics(raw, word){\n            const text = String(raw || \"\").trim();\n            const fallback = String(word || \"\").trim().split(\"\");\n            if (!text) return fallback;\n            const parts = text.split(/[\\s,，、/|｜+＋-]+/).map(p => p.trim()).filter(Boolean);\n            if (!parts.length) return fallback;\n            const joined = parts.join(\"\").toLowerCase();\n            const target = String(word || \"\").replace(/\\s+/g, \"\").toLowerCase();\n            return joined === target ? parts : fallback;\n        }\n\n        function makeTopicKey(book, unit, theme){\n            return String(book || \"未命名教材\").trim() + \"｜\" + String(unit || \"未命名单元\").trim() + \"｜\" + String(theme || \"综合\").trim();\n        }\n\n        function normalizeWord(raw){\n            const en = String(raw.en || raw.word || \"\").trim();\n            const phonics = String(raw.phonics || \"\").trim();\n            return {\n                book: String(raw.book || \"示例教材\").trim(),\n                unit: String(raw.unit || \"Unit 1\").trim(),\n                theme: String(raw.theme || \"综合\").trim(),\n                en,\n                phonics,\n                chunks: raw.chunks || splitPhonics(phonics, en),\n                cn: String(raw.cn || raw.chinese || \"\").trim()\n            };\n        }\n\n        function loadSavedVocabulary(){\n            const api = getListenChoiceAPI();\n            if (api && api.getVocabulary) {\n                const savedFromParent = api.getVocabulary();\n                if (savedFromParent && Object.keys(savedFromParent).length) {\n                    importedTopics = savedFromParent;\n                } else {\n                    try {\n                        const localSaved = JSON.parse(localStorage.getItem(STORAGE_KEY) || \"null\");\n                        importedTopics = localSaved && Object.keys(localSaved).length ? localSaved : sampleTopics;\n                    } catch(e) {\n                        importedTopics = sampleTopics;\n                    }\n                    if (api.saveVocabulary && importedTopics !== sampleTopics) api.saveVocabulary(importedTopics);\n                }\n                renderTopicSelect();\n                refreshIntegratedStudents();\n                return;\n            }\n            try {\n                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || \"null\");\n                importedTopics = saved && Object.keys(saved).length ? saved : sampleTopics;\n            } catch(e) {\n                importedTopics = sampleTopics;\n            }\n            renderTopicSelect();\n        }\n\n        function saveVocabulary(){\n            const api = getListenChoiceAPI();\n            if (api && api.saveVocabulary) {\n                api.saveVocabulary(importedTopics);\n                return;\n            }\n            localStorage.setItem(STORAGE_KEY, JSON.stringify(importedTopics));\n        }\n\n        function renderTopicSelect(){\n            const sel = document.getElementById(\"topicSelect\");\n            sel.innerHTML = \"<option value=''>— 请选择教材 / 单元 / 主题 —</option>\";\n            Object.keys(importedTopics).forEach(key => {\n                const list = importedTopics[key] || [];\n                const opt = document.createElement(\"option\");\n                opt.value = key;\n                opt.textContent = key + \"（\" + list.length + \" 词）\";\n                sel.appendChild(opt);\n            });\n            document.getElementById(\"topicSelector\").style.display = \"flex\";\n            updateRoundHint();\n        }\n\n        function loadTopic(){\n            const key = document.getElementById(\"topicSelect\").value;\n            currentTopicKey = key;\n            wordList = (importedTopics[key] || []).map(normalizeWord).filter(w => w.en);\n            resetGame(false);\n            if (!key) return;\n            if (uniqueWords(wordList).length < MIN_OPTIONS) {\n                showToast(\"这个主题至少需要 4 个不同单词\");\n                return;\n            }\n            preloadRoundAudio(uniqueWords(wordList));\n            updateRoundHint();\n            showToast(\"已选择：\" + key);\n        }\n\n        function uniqueWords(list){\n            const seen = {};\n            return list.filter(w => {\n                const key = String(w.en || \"\").toLowerCase();\n                if (!key || seen[key]) return false;\n                seen[key] = true;\n                return true;\n            });\n        }\n\n        function wordKey(word){\n            return String(word && word.en ? word.en : \"\").trim().toLowerCase();\n        }\n\n        function getRoundQuestionLimit(totalWords){\n            const value = document.getElementById(\"roundQuestionSelect\").value;\n            if (value === \"all\") return totalWords;\n            const parsed = parseInt(value, 10);\n            return Number.isFinite(parsed) && parsed > 0 ? parsed : MAX_QUESTIONS;\n        }\n\n        function updateRoundHint(){\n            const hint = document.getElementById(\"roundHint\");\n            if (!hint) return;\n            const uniqueCount = uniqueWords(wordList).length;\n            const value = document.getElementById(\"roundQuestionSelect\").value;\n            if (!uniqueCount) {\n                hint.textContent = value === \"all\"\n                    ? \"选择主题后可练习全部词，会优先练习未出现过的词。\"\n                    : \"当前每轮 \" + getRoundQuestionLimit(0) + \" 题，会优先练习未出现过的词。\";\n                return;\n            }\n            const roundCount = value === \"all\" ? uniqueCount : Math.min(getRoundQuestionLimit(uniqueCount), uniqueCount);\n            hint.textContent = \"本主题 \" + uniqueCount + \" 个词；每轮 \" + roundCount + \" 题，会优先练习未出现过的词。\";\n        }\n\n        function getNextRoundWords(unique){\n            const count = Math.min(getRoundQuestionLimit(unique.length), unique.length);\n            const topicKey = currentTopicKey || \"__default__\";\n            const validKeys = new Set(unique.map(wordKey));\n            const lastKeys = new Set((lastRoundByTopic[topicKey] || []).map(wordKey));\n            let pool = (topicRoundPools[topicKey] || shuffle(unique)).filter(w => validKeys.has(wordKey(w)));\n            const selected = [];\n\n            while (selected.length < count && pool.length) {\n                selected.push(pool.shift());\n            }\n\n            if (selected.length < count) {\n                const selectedKeys = new Set(selected.map(wordKey));\n                let refill = unique.filter(w => !selectedKeys.has(wordKey(w)) && !lastKeys.has(wordKey(w)));\n                if (refill.length < count - selected.length) {\n                    const refillKeys = new Set(refill.map(wordKey));\n                    unique.forEach(w => {\n                        const key = wordKey(w);\n                        if (!selectedKeys.has(key) && !refillKeys.has(key)) {\n                            refill.push(w);\n                            refillKeys.add(key);\n                        }\n                    });\n                }\n                pool = shuffle(refill);\n                while (selected.length < count && pool.length) {\n                    selected.push(pool.shift());\n                }\n            }\n\n            topicRoundPools[topicKey] = pool;\n            lastRoundByTopic[topicKey] = selected.slice();\n            return selected;\n        }\n\n        function startGame(){\n            const unique = uniqueWords(wordList);\n            if (unique.length < MIN_OPTIONS) {\n                showToast(\"请先选择至少 4 个不同单词的主题\");\n                return;\n            }\n            if (integratedMode && !selectedStudentId) {\n                showToast(\"请先点击学生姓名开始\");\n                return;\n            }\n            questionQueue = getNextRoundWords(unique);\n            totalQuestions = questionQueue.length;\n            currentIndex = 0;\n            correctCount = 0;\n            wrongWords = [];\n            answered = false;\n            nextQuestion();\n            updateStats();\n        }\n\n        function resetGame(clearTopic){\n            stopWordAudio();\n            questionQueue = [];\n            currentWord = null;\n            currentOptions = [];\n            currentIndex = 0;\n            totalQuestions = 0;\n            correctCount = 0;\n            wrongWords = [];\n            answered = false;\n            if (clearTopic) {\n                document.getElementById(\"topicSelect\").value = \"\";\n                wordList = [];\n                currentTopicKey = \"\";\n            }\n            document.getElementById(\"meaningBox\").textContent = \"\";\n            document.getElementById(\"phonicsBox\").textContent = \"\";\n            document.getElementById(\"options\").innerHTML = '<div class=\"empty\" style=\"grid-column:1/-1;\">请选择主题后开始</div>';\n            updateRoundHint();\n            updateStats();\n        }\n\n        function nextQuestion(){\n            stopWordAudio();\n            if     <div class="modal-overlay tool-modal" id="wheel-modal"> <div class="modal-content"> <button class="tool-close-btn" onclick="closeModal('wheel-modal')">✕</button> <iframe id="wheel-iframe" class="tool-iframe" sandbox="allow-scripts allow-same-origin"></iframe> </div> </div>
    <div class="modal-overlay tool-modal" id="timer-modal"> <div class="modal-content"> <button class="tool-close-btn" onclick="closeModal('timer-modal')">✕</button> <iframe id="timer-iframe" class="tool-iframe" sandbox="allow-scripts allow-same-origin"></iframe> </div> </div>
    <div class="modal-overlay tool-modal" id="dice-modal"> <div class="modal-content"> <button class="tool-close-btn" onclick="closeModal('dice-modal')">✕</button> <iframe id="dice-iframe" class="tool-iframe" sandbox="allow-scripts allow-same-origin"></iframe> </div> </div>

    <div class="modal-overlay tool-modal" id="dictation-modal"> <div class="modal-content"> <button class="tool-close-btn" onclick="closeModal('dictation-modal')">✕</button> <iframe id="dictation-iframe" class="tool-iframe" sandbox="allow-scripts allow-same-origin allow-downloads"></iframe> </div> </div>
    <div class="modal-overlay tool-modal" id="listen-choice-modal"> <div class="modal-content"> <button class="tool-close-btn" onclick="closeModal('listen-choice-modal')">✕</button> <iframe id="listen-choice-iframe" class="tool-iframe" sandbox="allow-scripts allow-same-origin allow-downloads"></iframe> </div> </div>
    <div class="modal-overlay tool-modal" id="match-modal"> <div class="modal-content"> <button class="tool-close-btn" onclick="closeModal('match-modal')">✕</button> <iframe id="match-iframe" class="tool-iframe" sandbox="allow-scripts allow-same-origin allow-downloads"></iframe> </div> </div>
    <div class="modal-overlay tool-modal" id="ket-verb-modal"> <div class="modal-content"> <button class="tool-close-btn" onclick="closeModal('ket-verb-modal')">✕</button> <iframe id="ket-verb-iframe" class="tool-iframe" title="KET不规则动词消消乐" sandbox="allow-scripts allow-same-origin allow-downloads"></iframe> </div> </div>
    <div class="modal-overlay tool-modal" id="tense-modal"> <div class="modal-content"> <button class="tool-close-btn" onclick="closeModal('tense-modal')">✕</button> <iframe id="tense-iframe" class="tool-iframe" title="一般现在时闯关" sandbox="allow-scripts allow-same-origin allow-downloads allow-modals"></iframe> </div> </div>
    <div class="modal-overlay tool-modal" id="pc-modal"> <div class="modal-content"> <button class="tool-close-btn" onclick="closeModal('pc-modal')">✕</button> <iframe id="pc-iframe" class="tool-iframe" title="现在进行时闯关" sandbox="allow-scripts allow-same-origin allow-downloads allow-modals"></iframe> </div> </div>
    
    <div class="modal-overlay attendance-fullscreen-modal" id="attendance-modal-container" data-attendance-theme="peach">
        <div class="attendance-shell" role="dialog" aria-modal="true" aria-label="排课与签到">
            <div class="attendance-topbar">
                <div class="attendance-brand">
                    <div class="attendance-logo">📅</div>
                    <div>
                        <div class="attendance-title">排课与签到</div>
                        <div class="attendance-subtitle" id="attendance-cloud-label">共享主系统班级、学生与云端配置</div>
                        <div class="attendance-theme-row" aria-label="签到主题色">
                            <button class="attendance-theme-dot peach active" onclick="attendanceChangeTheme('peach')" title="杏桃主题" type="button"></button>
                            <button class="attendance-theme-dot mint" onclick="attendanceChangeTheme('mint')" title="薄荷主题" type="button"></button>
                            <button class="attendance-theme-dot sky" onclick="attendanceChangeTheme('sky')" title="天蓝主题" type="button"></button>
                            <button class="attendance-theme-dot rose" onclick="attendanceChangeTheme('rose')" title="樱粉主题" type="button"></button>
                        </div>
                    </div>
                </div>
                <div class="attendance-month-nav">
                    <button class="attendance-icon-btn" onclick="attendanceChangeMonth(-1)" title="上个月">‹</button>
                    <div class="attendance-month-label" id="attendance-month-label">-</div>
                    <button class="attendance-icon-btn" onclick="attendanceChangeMonth(1)" title="下个月">›</button>
                    <button class="attendance-action-btn" onclick="attendanceGoToday()">今天</button>
                </div>
                <div class="attendance-actions">
                    <button class="attendance-action-btn" onclick="attendanceOpenCopyDialog()">复制课程</button>
                    <button class="attendance-action-btn" onclick="attendanceExportCSV()">导出CSV</button>
                    <button class="attendance-action-btn" onclick="attendanceRefresh()">刷新</button>
                    <button class="attendance-close" onclick="closeScheduleAttendance()" title="关闭">×</button>
                </div>
            </div>
            <div class="attendance-body">
                <aside class="attendance-side">
                    <div class="attendance-side-title">共享班级</div>
                    <div class="attendance-class-list" id="attendance-class-list"></div>
                    <div class="attendance-side-note">班级和学生名单来自积分主界面；需要增删学生时，关闭弹窗后在主界面操作即可。</div>
                </aside>
                <section class="attendance-calendar-wrap">
                    <div class="attendance-weekdays">
                        <div>周一</div><div>周二</div><div>周三</div><div>周四</div><div>周五</div><div>周六</div><div>周日</div>
                    </div>
                    <div class="attendance-calendar-grid" id="attendance-calendar-grid"></div>
                </section>
            </div>
        </div>
    </div>

    <div class="attendance-dialog" id="attendance-schedule-dialog">
        <div class="attendance-dialog-card">
            <div class="attendance-dialog-head">
                <div>
                    <div class="attendance-dialog-title" id="attendance-schedule-title">添加课程</div>
                    <div id="attendance-schedule-date" style="font-size:12px;opacity:.88;margin-top:2px;"></div>
                </div>
                <button class="attendance-icon-btn" onclick="attendanceCloseDialog('attendance-schedule-dialog')">×</button>
            </div>
            <div class="attendance-dialog-body">
                <input type="hidden" id="attendance-edit-schedule-id">
                <div class="attendance-form-grid">
                    <div>
                        <label class="attendance-label">选择班级</label>
                        <select class="attendance-select" id="attendance-schedule-class"></select>
                    </div>
                    <div class="attendance-form-grid two">
                        <div>
                            <label class="attendance-label">开始时间</label>
                            <input class="attendance-input" id="attendance-schedule-start" type="time" value="18:00">
                        </div>
                        <div>
                            <label class="attendance-label">结束时间</label>
                            <input class="attendance-input" id="attendance-schedule-end" type="time" value="19:30">
                        </div>
                    </div>
                </div>
            </div>
            <div class="attendance-dialog-actions">
                <button class="attendance-danger" id="attendance-delete-schedule-btn" onclick="attendanceDeleteEditingSchedule()" style="display:none;">删除课程</button>
                <button class="attendance-secondary" onclick="attendanceCloseDialog('attendance-schedule-dialog')">取消</button>
                <button class="attendance-primary" onclick="attendanceSaveSchedule()">保存</button>
            </div>
        </div>
    </div>

    <div class="attendance-dialog" id="attendance-roll-dialog">
        <div class="attendance-dialog-card wide">
            <div class="attendance-dialog-head">
                <div>
                    <div class="attendance-dialog-title" id="attendance-roll-title">学生签到</div>
                    <div id="attendance-roll-meta" style="font-size:12px;opacity:.88;margin-top:2px;"></div>
                </div>
                <button class="attendance-icon-btn" onclick="attendanceCloseDialog('attendance-roll-dialog')">×</button>
            </div>
            <div class="attendance-dialog-body">
                <div id="attendance-roll-list" class="attendance-roll-list"></div>
            </div>
            <div class="attendance-dialog-actions">
                <button class="attendance-primary" onclick="attendanceMarkAllPresent()">全班出勤</button>
                <button class="attendance-secondary" onclick="attendanceCloseDialog('attendance-roll-dialog')">完成</button>
            </div>
        </div>
    </div>

    <div class="attendance-dialog" id="attendance-copy-dialog">
        <div class="attendance-dialog-card">
            <div class="attendance-dialog-head">
                <div class="attendance-dialog-title">复制课程</div>
                <button class="attendance-icon-btn" onclick="attendanceCloseDialog('attendance-copy-dialog')">×</button>
            </div>
            <div class="attendance-dialog-body">
                <div class="attendance-form-grid">
                    <div>
                        <label class="attendance-label">源日期</label>
                        <select class="attendance-select" id="attendance-copy-source" onchange="attendanceRenderCopyCourses()"></select>
                    </div>
                    <div id="attendance-copy-course-list" class="attendance-roll-list"></div>
                    <div>
                        <label class="attendance-label">目标日期</label>
                        <input class="attendance-input" id="attendance-copy-target" type="date">
                    </div>
                </div>
            </div>
            <div class="attendance-dialog-actions">
                <button class="attendance-secondary" onclick="attendanceCloseDialog('attendance-copy-dialog')">取消</button>
                <button class="attendance-primary" onclick="attendanceCopyCourses()">确认复制</button>
            </div>
        </div>
    </div>
</body>
</html>
